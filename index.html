<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Vin</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
.btn{padding:10px;margin:5px;border:none;border-radius:8px;background:#111;color:#fff;cursor:pointer}
.field{width:100%;padding:10px;margin-top:5px}
</style>
</head>

<body>

<div class="card">
<h2>Tournée du jour</h2>
<button class="btn">Voir tournée</button>
</div>

<div class="card">
<h2>Clients</h2>
<input class="field" placeholder="Rechercher..." id="search">
<div id="clients"></div>
</div>

<div class="card">
<h2>Relances</h2>
<div id="relances"></div>
</div>

<div class="card">
<h2>Commandes</h2>
<div id="commandes"></div>
</div>

<script>

let clients = [
{
id:1,
nom:"Client test",
ville:"Paris",
lastVisit:"",
next:"",
commandes:[],
historique:[]
}
]

function renderClients(){
let html=""
clients.forEach(c=>{
html+=`
<div class="card">
<b>${c.nom}</b><br>
${c.ville}<br>

<button class="btn" onclick="visite(${c.id})">Visité</button>

<input type="date" id="date${c.id}" class="field">
<button class="btn" onclick="visiteManuelle(${c.id})">Visité le</button>

<button class="btn" onclick="addCommande(${c.id})">Commande</button>

</div>
`
})
document.getElementById("clients").innerHTML=html
}

function visite(id){
let c=clients.find(x=>x.id==id)
let today=new Date().toISOString().split("T")[0]
c.lastVisit=today
c.historique.push(today+" visite")
renderClients()
renderHistorique()
}

function visiteManuelle(id){
let date=document.getElementById("date"+id).value
if(!date)return
let c=clients.find(x=>x.id==id)
c.lastVisit=date
c.historique.push(date+" visite")
renderClients()
renderHistorique()
}

function addCommande(id){
let c=clients.find(x=>x.id==id)

let produit=prompt("Produit ?")
let qty=prompt("Quantité ?")

c.commandes.push({produit,qty,date:new Date().toISOString().split("T")[0]})
c.historique.push("commande "+produit+" x"+qty)

renderCommandes()
renderHistorique()
}

function renderCommandes(){
let html=""
clients.forEach(c=>{
c.commandes.forEach(o=>{
html+=`
<div class="card">
${c.nom}<br>
${o.produit} x ${o.qty}<br>
${o.date}
</div>
`
})
})
document.getElementById("commandes").innerHTML=html
}

function renderHistorique(){
let html=""
clients.forEach(c=>{
c.historique.forEach(h=>{
html+=`<div>${c.nom} - ${h}</div>`
})
})
}

renderClients()
renderCommandes()

</script>

</body>
</html>
