<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Vin</title>
  <meta name="theme-color" content="#111111" />
  <style>
    :root{
      --bg:#f5f5f5; --card:#ffffff; --text:#111111; --muted:#6b7280;
      --border:#e5e7eb; --accent:#111111; --ok:#16a34a; --warn:#d97706; --soft:#f3f4f6;
      --danger:#dc2626; --info:#2563eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:88px}
    .header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);padding:16px;z-index:10}
    .title{font-size:22px;font-weight:700;margin:0}
    .subtitle{font-size:12px;color:var(--muted);margin-top:4px}
    .content{padding:16px;display:flex;flex-direction:column;gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px}
    .dark{background:#111;color:#fff;border-color:#111}
    .dark .subtitle,.dark .muted{color:#d1d5db}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat{font-size:26px;font-weight:700}
    .muted{color:var(--muted);font-size:12px}
    .btn{border:none;border-radius:16px;padding:12px 14px;font-weight:600;cursor:pointer;background:#111;color:#fff;text-decoration:none;text-align:center;display:inline-block}
    .btn.secondary{background:#fff;color:#111;border:1px solid var(--border)}
    .btn.soft{background:var(--soft);color:#111}
    .btn.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
    .btn.danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .btn.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .btn.full{width:100%}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{background:#fff;border:1px solid var(--border);border-radius:18px;padding:14px;cursor:pointer}
    .item .name{font-weight:700;font-size:15px}
    .item .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .client{background:#dcfce7;color:#166534}
    .prospect{background:#fef3c7;color:#92400e}
    .inactive{background:#e5e7eb;color:#374151}
    .activeWine{background:#ecfccb;color:#3f6212}
    .archivedWine{background:#f3f4f6;color:#4b5563}
    .section-title{font-size:16px;font-weight:700;margin:0 0 10px}
    .actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .field{width:100%;padding:12px 14px;border-radius:16px;border:1px solid var(--border);background:#fff;font:inherit}
    textarea.field{min-height:90px;resize:vertical}
    .timeline{display:flex;flex-direction:column;gap:12px}
    .timeline-item{display:flex;gap:10px}
    .dot{width:10px;height:10px;border-radius:50%;background:#111;margin-top:5px;flex:0 0 auto}
    .mapbox{height:360px;border-radius:22px;background:linear-gradient(135deg,#d1d5db,#e5e7eb);position:relative;overflow:hidden;border:1px solid var(--border)}
    .pin{position:absolute;width:18px;height:18px;border-radius:50%;border:4px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.15)}
    .pin.client{background:#22c55e}
    .pin.prospect{background:#f59e0b}
    .pin.inactive{background:#6b7280}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 8px}
    .nav-inner{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
    .tab{border:none;background:transparent;border-radius:16px;padding:10px 6px;font-size:11px;color:var(--muted);cursor:pointer}
    .tab.active{background:#111;color:#fff;font-weight:700}
    .small{font-size:13px}
    .stars{display:flex;gap:6px;flex-wrap:wrap}
    .star{font-size:24px;cursor:pointer;line-height:1}
    .star.off{opacity:.3}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .pill{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#f3f4f6;font-size:12px;color:#374151}
    .hr{height:1px;background:var(--border);margin:6px 0}
  </style>
</head>

    let data = loadData();
    let screen = "home";
    let selectedClientId = 1;
    let selectedProductId = 1;
    let search = "";
    let productFilter = "all";

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : structuredClone(defaultData);
      } catch {
        return structuredClone(defaultData);
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function resetData() {
      if (!confirm("Réinitialiser les données locales ?")) return;
      data = structuredClone(defaultData);
      saveData();
      render();
    }

    function fmtDate(v) {
      if (!v) return "—";
      const d = new Date(v);
      return isNaN(d) ? v : d.toLocaleDateString("fr-FR");
    }

    function addDays(dateStr, days) {
      const d = new Date(dateStr);
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0, 10);
    }

    function nextId(arr) {
      return Math.max(0, ...arr.map(x => Number(x.id) || 0)) + 1;
    }

    function clientById(id) {
      return data.clients.find(c => c.id === Number(id));
    }

    function productById(id) {
      return data.products.find(p => p.id === Number(id));
    }

    function selectedClient() {
      return clientById(selectedClientId) || data.clients[0];
    }

    function selectedProduct() {
      return productById(selectedProductId) || data.products[0];
    }

    function openClient(id) {
      selectedClientId = Number(id);
      screen = "client";
      render();
    }

    function openProduct(id) {
      selectedProductId = Number(id);
      screen = "product";
      render();
    }

    function go(next) {
      screen = next;
      render();
    }

    function setSearch(v) {
      search = v;
      render();
    }

    function setProductFilter(v) {
      productFilter = v;
      render();
    }

    function mapsUrl(address) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
    }

    function wazeUrl(address) {
      return `https://waze.com/ul?q=${encodeURIComponent(address)}&navigate=yes`;
    }

    function statusBadge(status) {
      const cls = status === "client" ? "client" : status === "prospect" ? "prospect" : "inactive";
      return `<span class="badge ${cls}">${status}</span>`;
    }

    function wineBadge(active) {
      return `<span class="badge ${active ? "activeWine" : "archivedWine"}">${active ? "actif" : "archivé"}</span>`;
    }

    function filteredClients() {
      return data.clients.filter(c => {
        const hay = `${c.name} ${c.city} ${c.type} ${c.status} ${c.notes}`.toLowerCase();
        return hay.includes(search.toLowerCase());
      });
    }

    function filteredProducts() {
      return data.products.filter(p => {
        const hay = `${p.name} ${p.family} ${p.vintage} ${p.color} ${p.notes} ${p.techSheet}`.toLowerCase();
        const okSearch = hay.includes(search.toLowerCase());
        const okFilter =
          productFilter === "all" ||
          (productFilter === "active" && p.active) ||
          (productFilter === "archived" && !p.active);
        return okSearch && okFilter;
      });
    }

    function dueToday() {
      return data.clients
        .filter(c => c.nextFollowUp && c.nextFollowUp <= today)
        .sort((a,b) => a.nextFollowUp.localeCompare(b.nextFollowUp));
    }

    function dueSoon() {
      const limit = addDays(today, 7);
      return data.clients
        .filter(c => c.nextFollowUp && c.nextFollowUp > today && c.nextFollowUp <= limit)
        .sort((a,b) => a.nextFollowUp.localeCompare(b.nextFollowUp));
    }

    function markVisited(id, customDays = 21) {
      data.clients = data.clients.map(c => c.id === Number(id) ? {
        ...c,
        lastVisit: today,
        nextFollowUp: addDays(today, customDays),
        history: [
          { date: today, type: "visite", text: `Client visité · relance fixée à ${customDays} jours` },
          ...c.history
        ]
      } : c);
      saveData();
      render();
    }

    function postponeFollowUp(id, days) {
      data.clients = data.clients.map(c => c.id === Number(id) ? {
        ...c,
        nextFollowUp: addDays(today, days),
        history: [
          { date: today, type: "relance", text: `Relance replanifiée à +${days} jours` },
          ...c.history
        ]
      } : c);
      saveData();
      render();
    }

    function addNote() {
      const textarea = document.getElementById("new-note");
      if (!textarea || !textarea.value.trim()) return;
      const val = textarea.value.trim();
      data.clients = data.clients.map(c => c.id === selectedClientId ? {
        ...c,
        history: [{ date: today, type: "note", text: val }, ...c.history]
      } : c);
      saveData();
      render();
    }

    function addOrder() {
      const products = document.getElementById("order-products")?.value.trim() || "";
      const qty = document.getElementById("order-qty")?.value.trim() || "Non précisé";
      if (!products) return;
      data.clients = data.clients.map(c => c.id === selectedClientId ? {
        ...c,
        orders: [{ date: today, products, qty }, ...c.orders],
        history: [{ date: today, type: "commande", text: `${products} · ${qty}` }, ...c.history]
      } : c);
      saveData();
      render();
    }

    function addTasting() {
      const productId = Number(document.getElementById("taste-product")?.value || 0);
      const rating = Number(document.getElementById("taste-rating")?.value || 0);
      const liked = document.getElementById("taste-liked")?.checked || false;
      const comment = document.getElementById("taste-comment")?.value.trim() || "";
      if (!productId || !rating) {
        alert("Choisis un vin et une note.");
        return;
      }
      const product = productById(productId);
      const tasting = { date: today, productId, rating, liked, comment };
      data.clients = data.clients.map(c => c.id === selectedClientId ? {
        ...c,
        tastings: [tasting, ...(c.tastings || [])],
        history: [
          { date: today, type: "dégustation", text: `${product.name} ${product.vintage} · ${"★".repeat(rating)}${liked ? " · aimé" : ""}${comment ? " · " + comment : ""}` },
          ...c.history
        ]
      } : c);
      saveData();
      render();
    }

    function addClientToTour(clientId) {
      clientId = Number(clientId);
      if (!data.tourList.find(t => t.id === clientId)) {
        data.tourList.push({ id: clientId, time: "" });
        saveData();
      }
      screen = "tour";
      render();
    }

    function removeFromTour(clientId) {
      data.tourList = data.tourList.filter(t => t.id !== Number(clientId));
      saveData();
      render();
    }

    function moveUp(index) {
      if (index <= 0) return;
      [data.tourList[index - 1], data.tourList[index]] = [data.tourList[index], data.tourList[index - 1]];
      saveData();
      render();
    }

    function moveDown(index) {
      if (index >= data.tourList.length - 1) return;
      [data.tourList[index + 1], data.tourList[index]] = [data.tourList[index], data.tourList[index + 1]];
      saveData();
      render();
    }

    function updateTourTime(index, value) {
      data.tourList[index].time = value;
      saveData();
    }

    function saveClientEdits() {
      const c = selectedClient();
      c.name = document.getElementById("edit-client-name").value.trim();
      c.contact = document.getElementById("edit-client-contact").value.trim();
      c.phone = document.getElementById("edit-client-phone").value.trim();
      c.email = document.getElementById("edit-client-email").value.trim();
      c.address = document.getElementById("edit-client-address").value.trim();
      c.city = document.getElementById("edit-client-city").value.trim();
      c.zone = document.getElementById("edit-client-zone").value.trim();
      c.type = document.getElementById("edit-client-type").value;
      c.tariff = document.getElementById("edit-client-tariff").value.trim();
      c.status = document.getElementById("edit-client-status").value;
      c.notes = document.getElementById("edit-client-notes").value.trim();
      saveData();
      alert("Fiche client mise à jour.");
      render();
    }

    function saveProductEdits() {
      const p = selectedProduct();
      p.family = document.getElementById("edit-product-family").value.trim();
      p.name = document.getElementById("edit-product-name").value.trim();
      p.vintage = document.getElementById("edit-product-vintage").value.trim();
      p.color = document.getElementById("edit-product-color").value.trim();
      p.notes = document.getElementById("edit-product-notes").value.trim();
      p.techSheet = document.getElementById("edit-product-tech").value.trim();
      p.active = document.getElementById("edit-product-active").checked;
      saveData();
      alert("Fiche produit mise à jour.");
      render();
    }

    function duplicateProduct() {
      const p = selectedProduct();
      const copy = JSON.parse(JSON.stringify(p));
      copy.id = nextId(data.products);
      copy.name = `${p.name} copie`;
      copy.active = false;
      copy.linkedTo = p.id;
      data.products.unshift(copy);
      selectedProductId = copy.id;
      saveData();
      alert("Produit dupliqué.");
      render();
    }

    function createNextVintage() {
      const p = selectedProduct();
      const copy = JSON.parse(JSON.stringify(p));
      copy.id = nextId(data.products);
      copy.vintage = String((parseInt(p.vintage, 10) || new Date().getFullYear()) + 1);
      copy.active = true;
      copy.linkedTo = p.id;
      copy.name = p.name;
      data.products.unshift(copy);
      selectedProductId = copy.id;
      saveData();
      alert("Nouveau millésime créé.");
      render();
    }

    function toggleArchiveProduct() {
      const p = selectedProduct();
      p.active = !p.active;
      saveData();
      render();

    function createNewProduct() {
      const family = prompt("Nom de la cuvée / famille ?");
      if (!family) return;
      const vintage = prompt("Millésime ?", String(new Date().getFullYear())) || "";
      const color = prompt("Couleur / type ?", "Rouge") || "";
      const product = {
        id: nextId(data.products),
        family,
        name: family,
        vintage,
        color,
        active: true,
        linkedTo: null,
        techSheet: "",
        notes: ""
      };
      data.products.unshift(product);
      selectedProductId = product.id;
      saveData();
      screen = "product";
      render();
    }

    function productStats(productId, includeFamily = false) {
      const p = productById(productId);
      const ids = includeFamily
        ? data.products.filter(x => x.family === p.family).map(x => x.id)
        : [productId];
      const all = data.clients.flatMap(c => (c.tastings || []).filter(t => ids.includes(t.productId)).map(t => ({...t, clientId: c.id, clientName: c.name})));
      const ratings = all.map(x => x.rating);
      const avg = ratings.length ? (ratings.reduce((a,b)=>a+b,0) / ratings.length).toFixed(1) : "—";
      const liked = all.filter(x => x.liked).length;
      const uniqueClients = new Set(all.map(x => x.clientId)).size;
      return { total: all.length, avg, liked, uniqueClients, tastings: all };
    }

    function downloadBlob(blob, filename) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function toCSV(rows) {
      return rows.map(row =>
        row.map(v => {
          const s = String(v ?? "");
          return `"${s.replace(/"/g, '""')}"`;
        }).join(";")
      ).join("\n");
    }

        <div class="header">
          <h1 class="title">Carte clients</h1>
          <div class="subtitle">Vue simulée</div>
        </div>
        <div class="content">
          <input class="field" placeholder="Zone, ville, client..." value="${escapeHtml(search)}" oninput="setSearch(this.value)" />
          <div class="mapbox">
            ${list.map((c, i) => `
              <button class="pin ${c.status}" style="top:${18 + ((i*13)%65)}%;left:${15 + ((i*17)%65)}%;" onclick="openClient(${c.id})"></button>
            `).join("")}
            <div style="position:absolute;left:14px;right:14px;bottom:14px;background:rgba(255,255,255,.95);border-radius:18px;padding:14px;border:1px solid #fff;">
              <div class="name">Google Maps</div>
              <div class="meta" style="margin-top:6px;">Dans la vraie version, cette zone affichera la carte réelle avec itinéraires.</div>
            </div>
          </div>
        </div>
      `;
    }

    function tourView() {
      return `
        <div class="header">
          <h1 class="title">Tournée du jour</h1>
          <div class="subtitle">${data.tourList.length} étape(s) · ordre libre</div>
        </div>
        <div class="content">
          <div class="card dark">
            <div class="subtitle">Parcours du jour</div>
            <div style="font-size:24px;font-weight:700;margin-top:6px;">Organisation libre</div>
            <div class="toolbar" style="margin-top:12px;">
              <button class="btn secondary" onclick="go('addTour')">+ Ajouter un client</button>
              <a class="btn secondary" target="_blank" href="https://www.google.com/maps">GPS</a>
            </div>
          </div>

          ${data.tourList.map((t, i) => {
            const c = clientById(t.id);
            if (!c) return "";
            return `
              <div class="card">
                <div class="row">
                  <div>
                    <div class="name">${i + 1}. ${escapeHtml(c.name)}</div>
                    <div class="meta">${escapeHtml(c.city)} · ${escapeHtml(c.type)}</div>
                  </div>
                  <input class="field mono" style="width:90px;padding:10px 12px;" value="${escapeHtml(t.time || "")}" placeholder="heure" onchange="updateTourTime(${i}, this.value)" />
                </div>
                <div class="grid2" style="margin-top:12px;">
                  <button class="btn secondary" onclick="moveUp(${i})">⬆️ Monter</button>
                  <button class="btn secondary" onclick="moveDown(${i})">⬇️ Descendre</button>
                  <button class="btn" onclick="markVisited(${c.id},21)">Visité</button>
                  <button class="btn danger" onclick="removeFromTour(${c.id})">Supprimer</button>
                </div>
                <div class="grid2" style="margin-top:10px;">
                  <a class="btn secondary" href="${c.phone ? `tel:${c.phone}` : '#'}">Appeler</a>
                  <a class="btn secondary" target="_blank" href="${mapsUrl(c.address)}">Itinéraire</a>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function addTourView() {
      const ids = new Set(data.tourList.map(t => t.id));
      const list = data.clients.filter(c => !ids.has(c.id));
      return `
        <div class="header">
          <div class="row">
            <button class="btn soft" onclick="go('tour')">Retour</button>
            <div style="text-align:right;">
              <h1 class="title" style="font-size:20px;">Ajouter à la tournée</h1>
              <div class="subtitle">${list.length} disponible(s)</div>
            </div>
          </div>
        </div>
        <div class="content">
          ${list.map(c => `
            <div class="item" onclick="addClientToTour(${c.id})">
              <div class="name">${escapeHtml(c.name)}</div>
              <div class="meta">${escapeHtml(c.city)} · ${escapeHtml(c.type)}</div>
            </div>
          `).join("") || `<div class="muted">Tous les clients sont déjà dans la tournée.</div>`}
        </div>
      `;
    }

    function settingsView() {
      return `
        <div class="header">
          <h1 class="title">Sauvegarde / export</h1>
          <div class="subtitle">Lire tes données même sans l’app</div>
        </div>
        <div class="content">
          <div class="card">
            <div class="section-title">Sauvegarde locale</div>
            <div class="small">Les modifications sont conservées sur cet appareil grâce au stockage local du navigateur.</div>
            <div class="toolbar" style="margin-top:12px;">
              <button class="btn info" onclick="saveData(); alert('Données enregistrées sur cet appareil.')">Sauvegarder maintenant</button>
              <button class="btn danger" onclick="resetData()">Réinitialiser</button>
            </div>
          </div>

          <div class="card">
            <div class="section-title">Exports</div>
            <div class="list">
              <button class="btn soft" onclick="exportJSON()">Exporter sauvegarde JSON</button>
              <button class="btn soft" onclick="exportClientsCSV()">Exporter clients CSV</button>
              <button class="btn soft" onclick="exportProductsCSV()">Exporter produits CSV</button>
              <button class="btn soft" onclick="exportReadableTXT()">Exporter document lisible TXT</button>
            </div>
          </div>

          <div class="card">
            <div class="section-title">Ce que fait cette version</div>
            <div class="small">
              - sauvegarde locale sur ce téléphone / navigateur<br>
              - export de sécurité<br>
              - export lisible hors app<br>
              - produits, millésimes, archivage, dégustations
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function nav(current) {
      const tabs = [
        ["home","Accueil"],
        ["clients","Clients"],
        ["relances","Relances"],
        ["products","Vins"],
        ["tour","Tournée"],
        ["settings","Sauve"]
      ];
      return `
        <div class="nav">
          <div class="nav-inner">
            ${tabs.map(([key,label]) => `<button class="tab ${current===key?'active':''}" onclick="go('${key}')">${label}</button>`).join("")}
          </div>
        </div>
      `;
    }

    function render() {
      let html = "";
      if (screen === "home") html = homeView();
      if (screen === "clients") html = clientsView();
      if (screen === "client") html = clientView();
      if (screen === "relances") html = relancesView();
      if (screen === "products") html = productsView();
      if (screen === "product") html = productView();
      if (screen === "tour") html = tourView();
      if (screen === "addTour") html = addTourView();
      if (screen === "map") html = mapView();
      if (screen === "settings") html = settingsView();

      document.getElementById("app").innerHTML =
        html + nav(screen === "client" ? "clients" : screen === "product" ? "products" : screen === "addTour" ? "tour" : screen);
    }

    window.go = go;
    window.openClient = openClient;
    window.openProduct = openProduct;
    window.setSearch = setSearch;
    window.setProductFilter = setProductFilter;
    window.markVisited = markVisited;
    window.postponeFollowUp = postponeFollowUp;
    window.addNote = addNote;
    window.addOrder = addOrder;
    window.addTasting = addTasting;
    window.addClientToTour = addClientToTour;
    window.removeFromTour = removeFromTour;
    window.moveUp = moveUp;
    window.moveDown = moveDown;
    window.updateTourTime = updateTourTime;
    window.saveClientEdits = saveClientEdits;
    window.saveProductEdits = saveProductEdits;
    window.duplicateProduct = duplicateProduct;
    window.createNextVintage = createNextVintage;
    window.toggleArchiveProduct = toggleArchiveProduct;
    window.createNewProduct = createNewProduct;
    window.exportJSON = exportJSON;
    window.exportClientsCSV = exportClientsCSV;
    window.exportProductsCSV = exportProductsCSV;
    window.exportReadableTXT = exportReadableTXT;
    window.resetData = resetData;
    window.saveData = saveData;

    render();
  </script>
</body>
</html>
