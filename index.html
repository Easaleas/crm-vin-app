<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Vin</title>
  <meta name="theme-color" content="#111111" />
  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --border:#e5e7eb;
      --soft:#f3f4f6;
      --accent:#111111;
      --danger:#dc2626;
      --info:#2563eb;
      --ok:#16a34a;
      --warn:#d97706;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{padding-bottom:92px}
    .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg)}
    .header{
      position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);
      backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 16px
    }
    .title{margin:0;font-size:22px;font-weight:800;letter-spacing:-.02em}
    .subtitle{margin-top:4px;color:var(--muted);font-size:12px}
    .content{padding:16px;display:flex;flex-direction:column;gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px}
    .dark{background:#111;color:#fff;border-color:#111}
    .dark .subtitle,.dark .muted{color:#d1d5db}
    .section-title{font-size:16px;font-weight:800;margin:0 0 10px}
    .muted{color:var(--muted);font-size:12px}
    .small{font-size:13px}
    .name{font-size:15px;font-weight:700}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .stat{font-size:28px;font-weight:800;letter-spacing:-.03em}
    .field, select, textarea{
      width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:16px;
      background:#fff;font:inherit;color:var(--text)
    }
    textarea{min-height:96px;resize:vertical}
    .btn{
      appearance:none;border:none;background:var(--accent);color:#fff;
      border-radius:16px;padding:12px 14px;font-weight:700;cursor:pointer;
      text-decoration:none;text-align:center;display:inline-flex;align-items:center;
      justify-content:center;gap:8px;min-height:44px
    }
    .btn.full{width:100%}
    .btn.secondary{background:#fff;color:#111;border:1px solid var(--border)}
    .btn.soft{background:var(--soft);color:#111}
    .btn.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .btn.danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .btn.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{background:#fff;border:1px solid var(--border);border-radius:18px;padding:14px;cursor:pointer}
    .badge{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .client{background:#dcfce7;color:#166534}
    .prospect{background:#fef3c7;color:#92400e}
    .inactive{background:#e5e7eb;color:#374151}
    .activeWine{background:#ecfccb;color:#3f6212}
    .archivedWine{background:#f3f4f6;color:#4b5563}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .order-line{display:grid;grid-template-columns:1fr 90px;gap:10px;align-items:center;margin-top:10px}
    .star-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .star-btn{font-size:24px;line-height:1;background:transparent;border:none;cursor:pointer;padding:2px}
    .star-off{opacity:.25}
    .stats-card{padding:14px;border:1px solid var(--border);border-radius:18px;background:#fafafa}
    .suggestions{display:flex;flex-direction:column;gap:8px;margin-top:8px}
    .suggestion{background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px 12px;cursor:pointer;font-size:13px}
    .nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--border);padding:10px 8px;z-index:25}
    .nav-inner{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
    .tab{appearance:none;border:none;background:transparent;border-radius:16px;padding:10px 4px;font-size:10px;color:var(--muted);cursor:pointer}
    .tab.active{background:#111;color:#fff;font-weight:700}
    .clickable{cursor:pointer}
    .mapbox{
      position:relative;height:280px;border-radius:22px;overflow:hidden;
      background:linear-gradient(135deg,#d1d5db,#e5e7eb);border:1px solid var(--border)
    }
    .mapgrid{
      position:absolute;inset:0;opacity:.35;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.75) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.75) 1px, transparent 1px);
      background-size:38px 38px;
    }
    .pin{
      position:absolute;width:18px;height:18px;border-radius:50%;
      border:4px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.15)
    }
    .pin.client{background:#22c55e}
    .pin.prospect{background:#f59e0b}
    .pin.inactive{background:#6b7280}
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;
      display:flex;align-items:flex-end;justify-content:center
    }
    .modal-sheet{
      width:100%;max-width:430px;background:#fff;border-radius:24px 24px 0 0;
      padding:16px 16px 24px;max-height:80vh;overflow:auto
    }
  </style>
</head>
<body>
<div id="app" class="app"></div>

<script>
const STORAGE_KEY = "crm_vin_consolidee_v1";
const today = new Date().toISOString().slice(0,10);

const defaultData = {
  clients: [
    {
      id: 1,
      name: "Au fil de l’aire",
      type: "CHR",
      tariff: "CHR",
      status: "client",
      city: "Les Aires",
      zone: "Hérault",
      address: "1 Pl. de l'Aire, 34600 Les Aires",
      phone: "0658269126",
      email: "julien.marine.aufildelaire@gmail.com",
      contact: "Julien & Marine",
      notes: "Adore Collines. Bon client actif.",
      lastVisit: "2026-04-20",
      nextFollowUp: "2026-05-11",
      history: [
        { date: "2026-04-20", type: "commande", text: "Commande Collines rouge, blanc" }
      ],
      orders: [
        {
          id: 1001,
          date: "2026-04-20",
          status: "sent",
          comment: "",
          items: [
            { productId: 1, qty: 12 },
            { productId: 7, qty: 6 }
          ]
        }
      ],
      tastings: [
        { id: 2001, date: "2026-04-20", productId: 1, rating: 5, liked: true, comment: "Très bon retour" }
      ]
    },
    {
      id: 2,
      name: "Oli'vins",
      type: "Caviste",
      tariff: "Caviste",
      status: "prospect",
      city: "Mauguio",
      zone: "Hérault",
      address: "248 Bd de la Démocratie, 34130 Mauguio",
      phone: "0685842191",
      email: "",
      contact: "",
      notes: "Aime Collines, Grande Réserve, Allegro.",
      lastVisit: "2026-04-02",
      nextFollowUp: "2026-04-23",
      history: [],
      orders: [],
      tastings: [
        { id: 2004, date: "2026-04-02", productId: 3, rating: 4, liked: true, comment: "Plaît bien" }
      ]
    }
  ],
  products: [
    { id: 1, family: "Les Collines Rouge", name: "Les Collines Rouge", vintage: "2021", color: "Rouge", active: true, linkedTo: null, techSheet: "", notes: "" },
    { id: 2, family: "Les Collines Rosé", name: "Les Collines Rosé", vintage: "2025", color: "Rosé", active: true, linkedTo: null, techSheet: "", notes: "" },
    { id: 3, family: "Tournée Générale", name: "Tournée Générale", vintage: "2024", color: "Rouge", active: true, linkedTo: null, techSheet: "", notes: "" },
    { id: 4, family: "Allegro", name: "Allegro", vintage: "2023", color: "Blanc", active: true, linkedTo: null, techSheet: "", notes: "" },
    { id: 7, family: "Les Collines Blanc", name: "Les Collines Blanc", vintage: "2025", color: "Blanc", active: true, linkedTo: null, techSheet: "", notes: "" }
  ],
  tourList: [
    { id: 1, time: "09:30" },
    { id: 2, time: "11:00" }
  ]
};

let data = loadData();
let currentScreen = { name: "home", params: {} };
let search = "";
let ordersDateFilter = "";
let relanceSearch = "";
let tourSearch = "";
let tastingDraftRating = 0;
let modal = null;

function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : clone(defaultData);
  }catch{
    return clone(defaultData);
  }
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function nextId(arr){ return Math.max(0, ...arr.map(x => Number(x.id) || 0)) + 1; }

function esc(v){
  return String(v ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function fmtDate(v){
  if(!v) return "—";
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString("fr-FR");
}
function addDays(dateStr, days){
  const d = new Date(dateStr || today);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}

function clientById(id){ return data.clients.find(c => c.id === Number(id)); }
function productById(id){ return data.products.find(p => p.id === Number(id)); }

function pushScreen(name, params = {}){
  currentScreen = { name, params };
  history.pushState({ screen: currentScreen }, "", "#" + name + (params.id ? "-" + params.id : ""));
  render();
}
window.addEventListener("popstate", (e) => {
  if (e.state && e.state.screen) {
    currentScreen = e.state.screen;
  } else {
    currentScreen = { name: "home", params: {} };
  }
  render();
});
history.replaceState({ screen: currentScreen }, "", "#home");

function statusBadge(status){
  const cls = status === "client" ? "client" : status === "prospect" ? "prospect" : "inactive";
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}
function wineBadge(active){
  return `<span class="badge ${active ? "activeWine" : "archivedWine"}">${active ? "actif" : "archivé"}</span>`;
}

function allOrdersFlattened(){
  const rows = [];
  data.clients.forEach(c => {
    (c.orders || []).forEach(o => {
      rows.push({
        clientId: c.id,
        clientName: c.name,
        city: c.city,
        orderId: o.id,
        date: o.date,
        status: o.status,
        comment: o.comment || "",
        items: o.items || []
      });
    });
  });
  rows.sort((a,b) => b.date.localeCompare(a.date));
  return rows;
}
function filteredOrders(){
  return allOrdersFlattened().filter(o => !ordersDateFilter || o.date === ordersDateFilter);
}
function dueToday(){
  return data.clients
    .filter(c => c.nextFollowUp && c.nextFollowUp <= today)
    .sort((a,b) => a.nextFollowUp.localeCompare(b.nextFollowUp));
}
function dueSoon(){
  const limit = addDays(today, 7);
  return data.clients
    .filter(c => c.nextFollowUp && c.nextFollowUp > today && c.nextFollowUp <= limit)
    .sort((a,b) => a.nextFollowUp.localeCompare(b.nextFollowUp));
}

function filteredClients(){
  return data.clients.filter(c => {
    const hay = `${c.name} ${c.city} ${c.type} ${c.tariff} ${c.status} ${c.notes}`.toLowerCase();
    return hay.includes(search.toLowerCase());
  });
}
function clientSuggestionsForSearch(){
  if (!search.trim()) return [];
  return data.clients
    .filter(c => `${c.name} ${c.city}`.toLowerCase().includes(search.toLowerCase()))
    .slice(0,5);
}
function relanceSuggestions(){
  if (!relanceSearch.trim()) return [];
  return data.clients
    .filter(c => `${c.name} ${c.city}`.toLowerCase().includes(relanceSearch.toLowerCase()))
    .slice(0,5);
}
function tourCandidates(){
  const ids = new Set(data.tourList.map(t => t.id));
  return data.clients
    .filter(c => !ids.has(c.id))
    .filter(c => `${c.name} ${c.city}`.toLowerCase().includes(tourSearch.toLowerCase()));
}

function mapsUrl(address){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
}
function openTourMaps(){
  const clients = data.tourList.map(t => clientById(t.id)).filter(Boolean);
  if (!clients.length) return alert("Aucun client dans la tournée.");
  const addresses = clients.map(c => c.address).filter(Boolean);
  if (!addresses.length) return alert("Aucune adresse exploitable.");
  const origin = addresses[0];
  const destination = addresses[addresses.length - 1];
  const waypoints = addresses.slice(1, -1).join("|");
  let url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&travelmode=driving`;
  if (waypoints) url += `&waypoints=${encodeURIComponent(waypoints)}`;
  window.open(url, "_blank");
}

function createClient(){
  const name = document.getElementById("new-client-name").value.trim();
  if (!name) return alert("Le nom du client est obligatoire.");
  const client = {
    id: nextId(data.clients),
    name,
    type: document.getElementById("new-client-type").value,
    tariff: document.getElementById("new-client-tariff").value,
    status: document.getElementById("new-client-status").value,
    city: document.getElementById("new-client-city").value.trim(),
    zone: document.getElementById("new-client-zone").value.trim(),
    address: document.getElementById("new-client-address").value.trim(),
    phone: document.getElementById("new-client-phone").value.trim(),
    email: document.getElementById("new-client-email").value.trim(),
    contact: document.getElementById("new-client-contact").value.trim(),
    notes: document.getElementById("new-client-notes").value.trim(),
    lastVisit: "",
    nextFollowUp: "",
    history: [{ date: today, type: "création", text: "Fiche créée manuellement" }],
    orders: [],
    tastings: []
  };
  data.clients.unshift(client);
  saveData();
  pushScreen("client", { id: client.id });
}

function saveClientEdits(id){
  const c = clientById(id);
  c.name = document.getElementById("edit-client-name").value.trim();
  c.contact = document.getElementById("edit-client-contact").value.trim();
  c.phone = document.getElementById("edit-client-phone").value.trim();
  c.email = document.getElementById("edit-client-email").value.trim();
  c.address = document.getElementById("edit-client-address").value.trim();
  c.city = document.getElementById("edit-client-city").value.trim();
  c.zone = document.getElementById("edit-client-zone").value.trim();
  c.type = document.getElementById("edit-client-type").value;
  c.tariff = document.getElementById("edit-client-tariff").value;
  c.status = document.getElementById("edit-client-status").value;
  c.notes = document.getElementById("edit-client-notes").value.trim();
  saveData();
  render();
}

function setManualFollowUp(id){
  const c = clientById(id);
  const date = document.getElementById("manual-followup-date").value;
  if (!date) return alert("Choisis une date.");
  c.nextFollowUp = date;
  saveData();
  render();
}
function postponeFollowUp(id, days){
  const c = clientById(id);
  c.nextFollowUp = addDays(today, days);
  saveData();
  render();
}
function markVisited(id){
  const c = clientById(id);
  c.lastVisit = today;
  c.nextFollowUp = addDays(today, 21);
  saveData();
  render();
}
function addFollowUpForClient(id, date){
  if (!date) return alert("Choisis une date.");
  const c = clientById(id);
  c.nextFollowUp = date;
  saveData();
  render();
}

function setTastingDraftRating(v){
  tastingDraftRating = v;
  render();
}
function addTasting(id){
  const productId = Number(document.getElementById("taste-product").value);
  if (!productId || !tastingDraftRating) return alert("Choisis un vin et une note.");
  const c = clientById(id);
  c.tastings.unshift({
    id: Date.now(),
    date: today,
    productId,
    rating: tastingDraftRating,
    liked: document.getElementById("taste-liked").checked,
    comment: document.getElementById("taste-comment").value.trim()
  });
  tastingDraftRating = 0;
  saveData();
  render();
}

function addOrder(id){
  const c = clientById(id);
  const items = [];
  document.querySelectorAll(".order-line").forEach(line => {
    const productId = Number(line.dataset.id);
    const qty = Number(line.querySelector("input").value || 0);
    if (qty > 0) items.push({ productId, qty });
  });
  if (!items.length) return alert("Aucune quantité renseignée.");
  c.orders.unshift({
    id: Date.now(),
    date: today,
    status: "pending",
    comment: document.getElementById("order-comment").value.trim(),
    items
  });
  saveData();
  render();
}
function toggleOrderStatus(clientId, orderId){
  const c = clientById(clientId);
  const o = c.orders.find(x => x.id === orderId);
  o.status = o.status === "sent" ? "pending" : "sent";
  saveData();
  render();
}
function editOrder(clientId, orderId){
  const c = clientById(clientId);
  const o = c.orders.find(x => x.id === orderId);
  const newComment = prompt("Modifier le commentaire :", o.comment || "");
  if (newComment !== null) o.comment = newComment;
  o.items.forEach(item => {
    const newQty = prompt("Modifier quantité pour " + (productById(item.productId)?.name || "vin"), item.qty);
    if (newQty !== null) item.qty = Number(newQty) || item.qty;
  });
  saveData();
  render();
}

function addClientToTour(clientId){
  if (!data.tourList.find(t => t.id === Number(clientId))) {
    data.tourList.push({ id: Number(clientId), time: "" });
    saveData();
  }
  render();
}
function removeFromTour(clientId){
  data.tourList = data.tourList.filter(t => t.id !== Number(clientId));
  saveData();
  render();
}
function moveTourUp(index){
  if (index <= 0) return;
  [data.tourList[index - 1], data.tourList[index]] = [data.tourList[index], data.tourList[index - 1]];
  saveData();
  render();
}
function moveTourDown(index){
  if (index >= data.tourList.length - 1) return;
  [data.tourList[index + 1], data.tourList[index]] = [data.tourList[index], data.tourList[index + 1]];
  saveData();
  render();
}
function updateTourTime(index, value){
  data.tourList[index].time = value;
  saveData();
}

function productStats(productId){
  const tastingRows = [];
  const orderRows = [];
  data.clients.forEach(c => {
    (c.tastings || []).forEach(t => {
      if (t.productId === productId) tastingRows.push({ ...t, clientId: c.id, clientName: c.name });
    });
    (c.orders || []).forEach(o => {
      o.items.forEach(i => {
        if (i.productId === productId) {
          orderRows.push({ clientId: c.id, clientName: c.name, date: o.date, status: o.status, qty: i.qty });
        }
      });
    });
  });
  const ratings = tastingRows.map(t => t.rating);
  return {
    tastings: tastingRows,
    orders: orderRows,
    avg: ratings.length ? (ratings.reduce((a,b)=>a+b,0) / ratings.length).toFixed(1) : "—"
  };
}
function openProductClients(productId, mode){
  const p = productById(productId);
  const stats = productStats(productId);
  const rows = mode === "tastings"
    ? stats.tastings.map(t => ({
        clientId: t.clientId,
        title: t.clientName,
        line1: `${fmtDate(t.date)} · ${"★".repeat(t.rating)}`,
        line2: t.comment || ""
      }))
    : stats.orders.map(o => ({
        clientId: o.clientId,
        title: o.clientName,
        line1: `${fmtDate(o.date)} · ${o.qty} bt · ${o.status === "sent" ? "transmise" : "non transmise"}`,
        line2: ""
      }));

  modal = { title: `${p.name} ${p.vintage}`, rows };
  render();
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  downloadBlob(blob, `crm-vin-${today}.json`);
}
function exportClientsCSV(){
  const rows = [["id","nom","type","tarif","statut","ville"]];
  data.clients.forEach(c => rows.push([c.id, c.name, c.type, c.tariff, c.status, c.city]));
  downloadBlob(new Blob([toCSV(rows)], { type: "text/csv;charset=utf-8;" }), `clients-${today}.csv`);
}
function exportProductsCSV(){
  const rows = [["id","nom","millesime"]];
  data.products.forEach(p => rows.push([p.id, p.name, p.vintage]));
  downloadBlob(new Blob([toCSV(rows)], { type: "text/csv;charset=utf-8;" }), `produits-${today}.csv`);
}
function exportReadableTXT(){
  const blob = new Blob(["Export lisible CRM Vin"], { type: "text/plain;charset=utf-8;" });
  downloadBlob(blob, `crm-vin-lisible-${today}.txt`);
}
function toCSV(rows){
  return rows.map(row => row.map(v => `"${String(v ?? "").replace(/"/g,'""')}"`).join(";")).join("\n");
}
function downloadBlob(blob, filename){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function screenHeader(title, subtitle="", back=null){
  return `
    <div class="header">
      <div class="row">
        <div style="min-width:0">
          <h1 class="title">${esc(title)}</h1>
          ${subtitle ? `<div class="subtitle">${subtitle}</div>` : ``}
        </div>
        ${back ? `<button class="btn soft" style="width:auto" onclick="${back}">Retour</button>` : ``}
      </div>
    </div>
  `;
}

function renderHome(){
  const urgent = dueToday();
  const pendingOrders = allOrdersFlattened().filter(o => o.status === "pending").length;
  return `
    ${screenHeader("Bonjour 👋","Usage terrain")}
    <div class="content">
      <div class="grid3">
        <div class="card clickable" onclick="pushScreen('clients')"><div class="stat">${data.clients.length}</div><div class="muted">Clients</div></div>
        <div class="card clickable" onclick="pushScreen('relances')"><div class="stat">${urgent.length}</div><div class="muted">Relances</div></div>

function renderStats(){
  const totalClients = data.clients.length;
  const activeClients = data.clients.filter(c => c.status === "client").length;
  const prospects = data.clients.filter(c => c.status === "prospect").length;
  const pendingOrders = allOrdersFlattened().filter(o => o.status === "pending").length;
  const sentOrders = allOrdersFlattened().filter(o => o.status === "sent").length;
  const totalTastings = data.clients.reduce((sum, c) => sum + (c.tastings || []).length, 0);

  const tasteCount = {};
  const orderCount = {};
  data.clients.forEach(c => {
    (c.tastings || []).forEach(t => { tasteCount[t.productId] = (tasteCount[t.productId] || 0) + 1; });
    (c.orders || []).forEach(o => o.items.forEach(i => { orderCount[i.productId] = (orderCount[i.productId] || 0) + i.qty; }));
  });

  const topTasted = Object.entries(tasteCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topOrdered = Object.entries(orderCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

  return `
    ${screenHeader("Stats","Vue d’ensemble")}
    <div class="content">
      <div class="stats-grid">
        <div class="stats-card"><div class="stat">${totalClients}</div><div class="muted">Clients total</div></div>
        <div class="stats-card"><div class="stat">${activeClients}</div><div class="muted">Clients actifs</div></div>
        <div class="stats-card"><div class="stat">${prospects}</div><div class="muted">Prospects</div></div>
        <div class="stats-card"><div class="stat">${dueToday().length}</div><div class="muted">Relances urgentes</div></div>
        <div class="stats-card"><div class="stat">${pendingOrders}</div><div class="muted">Cmd en attente</div></div>
        <div class="stats-card"><div class="stat">${sentOrders}</div><div class="muted">Cmd transmises</div></div>
        <div class="stats-card"><div class="stat">${totalTastings}</div><div class="muted">Dégustations</div></div>
      </div>

      <div class="card">
        <div class="section-title">Vins les plus dégustés</div>
        <div class="list">
          ${topTasted.length ? topTasted.map(([id,count]) => `<div class="item">${esc(productById(id)?.name || "Vin")} · ${count}</div>`).join("") : `<div class="muted">Aucune donnée.</div>`}
        </div>
      </div>

      <div class="card">
        <div class="section-title">Vins les plus commandés</div>
        <div class="list">
          ${topOrdered.length ? topOrdered.map(([id,count]) => `<div class="item">${esc(productById(id)?.name || "Vin")} · ${count} bt</div>`).join("") : `<div class="muted">Aucune donnée.</div>`}
        </div>
      </div>
    </div>
  `;
}

  const tabs = [
    ["home","Accueil"],
    ["clients","Clients"],
    ["relances","Relances"],
    ["orders","Cmd"],
    ["products","Vins"],
    ["tour","Tournée"],
    ["stats","Stats"],
    ["settings","Sauve"]
  ];
  return `
    <div class="nav">
      <div class="nav-inner">
        ${tabs.map(([key,label]) => `<button class="tab ${current===key?'active':''}" onclick="pushScreen('${key}')">${label}</button>`).join("")}
      </div>

  `;

function render(){
  let html = "";
  if (currentScreen.name === "home") html = renderHome();
  if (currentScreen.name === "clients") html = renderClients();
  if (currentScreen.name === "clientCreate") html = renderClientCreate();
  if (currentScreen.name === "client") html = renderClient(currentScreen.params.id);
  if (currentScreen.name === "relances") html = renderRelances();
  if (currentScreen.name === "orders") html = renderOrders();
  if (currentScreen.name === "products") html = renderProducts();
  if (currentScreen.name === "product") html = renderProduct(currentScreen.params.id);
  if (currentScreen.name === "tour") html = renderTour();
  if (currentScreen.name === "stats") html = renderStats();
  if (currentScreen.name === "settings") html = renderSettings();

  const root = document.getElementById("app");

  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  const activeValue = active && "value" in active ? active.value : null;
  const selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === "number" ? active.selectionEnd : null;

  root.innerHTML = html + renderNav() + renderModal();

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (activeValue !== null) el.value = activeValue;
      if (selStart !== null && selEnd !== null && typeof el.setSelectionRange === "function") {
        el.setSelectionRange(selStart, selEnd);
      }
    }
  }
}
