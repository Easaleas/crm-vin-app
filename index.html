<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Vin</title>
  <style>
    :root{
      --bg:#f5f5f5; --card:#fff; --text:#111; --muted:#666; --border:#ddd;
      --dark:#111; --soft:#f1f1f1; --blue:#eaf3ff; --green:#eaf9ef; --orange:#fff4e8; --red:#fff0f0;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Arial,sans-serif;color:var(--text);padding-bottom:80px}
    .app{max-width:430px;margin:0 auto}
    .header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;z-index:10}
    .title{font-size:22px;font-weight:700}
    .subtitle{font-size:12px;color:var(--muted);margin-top:4px}
    .content{padding:12px;display:flex;flex-direction:column;gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
    .card.dark{background:var(--dark);color:#fff}
    .btn{border:none;border-radius:10px;padding:10px 12px;background:#111;color:#fff;cursor:pointer}
    .btn.secondary{background:#fff;color:#111;border:1px solid var(--border)}
    .btn.soft{background:var(--soft);color:#111}
    .btn.blue{background:var(--blue);color:#0f4ea8;border:1px solid #c3d9ff}
    .btn.red{background:var(--red);color:#b00020;border:1px solid #efb7c1}
    .field, select, textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:#fff}
    textarea{min-height:70px;resize:vertical}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .list{display:flex;flex-direction:column;gap:8px}
    .item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .name{font-weight:700}
    .muted{color:var(--muted);font-size:12px}
    .small{font-size:13px}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px}
    .badge.client{background:#dff5e5;color:#15703a}
    .badge.prospect{background:#fff2cc;color:#8a6400}
    .badge.inactif{background:#eee;color:#555}
    .nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--border);padding:8px}
    .nav-inner{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .tab{border:none;background:transparent;padding:8px 4px;border-radius:10px;font-size:11px;color:#666}
    .tab.active{background:#111;color:#fff}
    .suggestions{display:flex;flex-direction:column;gap:6px;margin-top:8px}
    .suggestion{border:1px solid var(--border);border-radius:10px;padding:8px;background:#fff;cursor:pointer}
    .order-line{display:grid;grid-template-columns:1fr 90px;gap:10px;align-items:center;margin-top:8px}
    .stars{display:flex;gap:4px;flex-wrap:wrap}
    .star{font-size:22px;cursor:pointer;background:none;border:none;padding:0}
    .off{opacity:.25}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stats-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer}
    .stat{font-size:28px;font-weight:700}
    .periods{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:30}
    .modal{width:100%;max-width:430px;background:#fff;border-radius:16px 16px 0 0;padding:14px;max-height:85vh;overflow:auto}
  </style>
</head>
<body>
<div id="app" class="app"></div>

<script>
const STORAGE_KEY = "crm_vin_final_stable_v3";
const today = new Date().toISOString().slice(0,10);

const defaultData = {
  clients: [
    {
      id:1,
      name:"Au fil de l’aire",
      type:"CHR",
      tariff:"CHR",
      status:"client",
      city:"Les Aires",
      zone:"Hérault",
      address:"1 Pl. de l'Aire, 34600 Les Aires",
      phone:"0658269126",
      email:"julien.marine.aufildelaire@gmail.com",
      contact:"",
      notes:"Bon client actif.",
      lastVisit:"2026-04-20",
      nextFollowUp:"2026-05-11",
      tastings:[
        {id:1,date:"2026-04-20",productId:1,rating:5,comment:"Très bon retour"}
      ],
      orders:[
        {id:1,date:"2026-04-20",status:"sent",comment:"",items:[{productId:1,qty:12},{productId:5,qty:6}]}
      ],
      history:[
        {id:1,date:"2026-04-20",type:"visite",text:"Visité"},
        {id:2,date:"2026-04-20",type:"dégustation",text:"Les Collines Rouge ★★★★★ — Très bon retour"},
        {id:3,date:"2026-04-20",type:"commande",text:"Les Collines Rouge x12, Les Collines Blanc x6"}
      ]
    },
    {
      id:2,
      name:"Oli'vins",
      type:"Caviste",
      tariff:"Caviste",
      status:"prospect",
      city:"Mauguio",
      zone:"Hérault",
      address:"248 Bd de la Démocratie, 34130 Mauguio",
      phone:"0685842191",
      email:"",
      contact:"",
      notes:"Aime Collines et Allegro.",
      lastVisit:"",
      nextFollowUp:"2026-04-24",
      tastings:[],
      orders:[],
      history:[]
    }
  ],
  products: [
    {id:1,name:"Les Collines Rouge",family:"Les Collines",vintage:"2021",color:"Rouge",active:true},
    {id:2,name:"Les Collines Rosé",family:"Les Collines",vintage:"2025",color:"Rosé",active:true},
    {id:3,name:"Tournée Générale",family:"Tournée Générale",vintage:"2024",color:"Rouge",active:true},
    {id:4,name:"Allegro",family:"Allegro",vintage:"2023",color:"Blanc",active:true},
    {id:5,name:"Les Collines Blanc",family:"Les Collines",vintage:"2025",color:"Blanc",active:true}
  ],
  tourList:[
    {id:1,time:"09:30"},
    {id:2,time:"11:00"}
  ]
};

let data = loadData();
let state = {
  screen:"home",
  params:{},
  clientSearch:"",
  relanceSearch:"",
  tourSearch:"",
  ordersDate:"",
  period:"1y",
  manualStart:"",
  manualEnd:"",
  modal:null,
  tastingDraft:{}
};

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(defaultData));
  }catch{
    return JSON.parse(JSON.stringify(defaultData));
  }
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function nextId(arr){ return Math.max(0,...arr.map(x=>Number(x.id)||0))+1; }
function nextHistoryId(){
  const ids = data.clients.flatMap(c => (c.history||[]).map(h => h.id || 0));
  return Math.max(0,...ids)+1;
}
function esc(v){
  return String(v ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function fmtDate(v){
  if(!v) return "—";
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString("fr-FR");
}
function addDays(date, days){
  const d = new Date(date || today);
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function monthsAgo(m){
  const d = new Date();
  d.setMonth(d.getMonth()-m);
  return d.toISOString().slice(0,10);
}
function inPeriod(dateStr){
  if(state.period==="manual"){
    const start = state.manualStart || "1900-01-01";
    const end = state.manualEnd || "2999-12-31";
    return dateStr >= start && dateStr <= end;
  }
  if(state.period==="1m") return dateStr >= monthsAgo(1);
  if(state.period==="3m") return dateStr >= monthsAgo(3);
  if(state.period==="6m") return dateStr >= monthsAgo(6);
  return dateStr >= monthsAgo(12);
}
function clientById(id){ return data.clients.find(c => c.id===Number(id)); }
function productById(id){ return data.products.find(p => p.id===Number(id)); }
function activeProducts(){ return data.products.filter(p => p.active); }

function go(screen, params={}){
  state.screen = screen;
  state.params = params;
  render();
}

function addHistory(clientId, type, text, date=today){
  const c = clientById(clientId);
  c.history = c.history || [];
  c.history.unshift({id:nextHistoryId(), date, type, text});
}
function mapsUrl(address){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
}
function openTourMaps(){
  const clients = data.tourList.map(t => clientById(t.id)).filter(Boolean);
  if(!clients.length) return alert("Aucun client dans la tournée.");
  const addresses = clients.map(c => c.address).filter(Boolean);
  if(!addresses.length) return alert("Aucune adresse exploitable.");
  const origin = addresses[0];
  const destination = addresses[addresses.length-1];
  const waypoints = addresses.slice(1,-1).join("|");
  let url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&travelmode=driving`;
  if(waypoints) url += `&waypoints=${encodeURIComponent(waypoints)}`;
  window.open(url,"_blank");
}

function allOrders(){
  const rows = [];
  data.clients.forEach(c => (c.orders||[]).forEach(o => rows.push({
    clientId:c.id, clientName:c.name, city:c.city, ...JSON.parse(JSON.stringify(o))
  })));
  return rows.sort((a,b)=>b.date.localeCompare(a.date));
}
function filteredOrders(){
  return allOrders().filter(o => !state.ordersDate || o.date===state.ordersDate);
}
function dueToday(){
  return data.clients.filter(c => c.nextFollowUp && c.nextFollowUp <= today).sort((a,b)=>a.nextFollowUp.localeCompare(b.nextFollowUp));
}
function dueNext3(){
  const max = addDays(today,3);
  return data.clients.filter(c => c.nextFollowUp && c.nextFollowUp > today && c.nextFollowUp <= max).sort((a,b)=>a.nextFollowUp.localeCompare(b.nextFollowUp));
}
function dueLater(){
  const min = addDays(today,3);
  return data.clients.filter(c => c.nextFollowUp && c.nextFollowUp > min).sort((a,b)=>a.nextFollowUp.localeCompare(b.nextFollowUp));
}
function clientSuggestions(q){
  if(!q.trim()) return [];
  return data.clients.filter(c => `${c.name} ${c.city}`.toLowerCase().includes(q.toLowerCase())).slice(0,6);
}
function filteredClients(){
  return data.clients.filter(c => `${c.name} ${c.city} ${c.type} ${c.tariff} ${c.status} ${c.notes}`.toLowerCase().includes(state.clientSearch.toLowerCase()));
}
function tourCandidates(){
  const ids = new Set(data.tourList.map(t=>t.id));
  return data.clients.filter(c => !ids.has(c.id) && `${c.name} ${c.city}`.toLowerCase().includes(state.tourSearch.toLowerCase()));
}

function createClient(){
  const name = document.getElementById("new-client-name").value.trim();
  if(!name) return alert("Le nom du client est obligatoire.");
  const c = {
    id:nextId(data.clients),
    name,
    type:document.getElementById("new-client-type").value,
    tariff:document.getElementById("new-client-tariff").value,
    status:document.getElementById("new-client-status").value,
    city:document.getElementById("new-client-city").value.trim(),
    zone:document.getElementById("new-client-zone").value.trim(),
    address:document.getElementById("new-client-address").value.trim(),
    phone:document.getElementById("new-client-phone").value.trim(),
    email:document.getElementById("new-client-email").value.trim(),
    contact:document.getElementById("new-client-contact").value.trim(),
    notes:document.getElementById("new-client-notes").value.trim(),
    lastVisit:"",
    nextFollowUp:"",
    tastings:[],
    orders:[],
    history:[{id:nextHistoryId(),date:today,type:"création",text:"Fiche créée manuellement"}]
  };
  data.clients.unshift(c);
  saveData();
  go("client",{id:c.id});
}

function saveClientEdits(id){
  const c = clientById(id);
  c.name = document.getElementById("edit-client-name").value.trim();
  c.contact = document.getElementById("edit-client-contact").value.trim();
  c.phone = document.getElementById("edit-client-phone").value.trim();
  c.email = document.getElementById("edit-client-email").value.trim();
  c.address = document.getElementById("edit-client-address").value.trim();
  c.city = document.getElementById("edit-client-city").value.trim();
  c.zone = document.getElementById("edit-client-zone").value.trim();
  c.type = document.getElementById("edit-client-type").value;
  c.tariff = document.getElementById("edit-client-tariff").value;
  c.status = document.getElementById("edit-client-status").value;
  c.notes = document.getElementById("edit-client-notes").value.trim();
  saveData();
  render();
}

function markVisited(id){
  const c = clientById(id);
  c.lastVisit = today;
  c.nextFollowUp = addDays(today,21);
  addHistory(id,"visite","Visité",today);
  saveData();
  render();
}
function openVisitedPicker(){
  const input = document.getElementById("visited-manual-date");
  if(!input) return;
  if(input.showPicker) input.showPicker();
  else input.focus();
}
function setVisitedManual(id){
  const date = document.getElementById("visited-manual-date").value;
  if(!date) return;
  clientById(id).lastVisit = date;
  addHistory(id,"visite","Visité",date);
  saveData();
  render();
}
function postponeFollowUp(id,days){
  clientById(id).nextFollowUp = addDays(today,days);
  saveData();
  render();
}
function setManualFollowUp(id){
  const date = document.getElementById("manual-followup-date").value;
  if(!date) return alert("Choisis une date.");
  clientById(id).nextFollowUp = date;
  saveData();
  render();
}
function addFollowUpForClient(id, date){
  if(!date) return alert("Choisis une date.");
  clientById(id).nextFollowUp = date;
  saveData();
  render();
}

function setTasteRating(productId, rating){
  if(!state.tastingDraft[productId]) state.tastingDraft[productId] = {rating:0, comment:""};
  state.tastingDraft[productId].rating = rating;
  render();
}
function setTasteComment(productId, value){
  if(!state.tastingDraft[productId]) state.tastingDraft[productId] = {rating:0, comment:""};
  state.tastingDraft[productId].comment = value;
}
function addTastings(clientId){
  const c = clientById(clientId);
  let added = 0;
  activeProducts().forEach(p => {
    const draft = state.tastingDraft[p.id] || {rating:0, comment:""};
    const rating = Number(draft.rating || 0);
    const comment = (draft.comment || "").trim();
    if(rating > 0 || comment){
      c.tastings.unshift({
        id:Date.now()+p.id,
        date:today,
        productId:p.id,
        rating,
        comment
      });
      addHistory(clientId,"dégustation",`${p.name} ${rating ? "★".repeat(rating) : ""}${comment ? " — " + comment : ""}`.trim(),today);
      added++;
    }
  });
  if(!added) return alert("Renseigne au moins une dégustation.");
  state.tastingDraft = {};
  saveData();
  render();
}

function addOrder(clientId){
  const c = clientById(clientId);
  const items = [];
  document.querySelectorAll(".order-line").forEach(line => {
    const pid = Number(line.dataset.id);
    const qty = Number(line.querySelector("input").value || 0);
    if(qty > 0) items.push({productId:pid, qty});
  });
  if(!items.length) return alert("Aucune quantité renseignée.");
  const comment = document.getElementById("order-comment").value.trim();
  const order = {id:Date.now(), date:today, status:"pending", comment, items};
  c.orders.unshift(order);
  addHistory(clientId,"commande",items.map(i => `${productById(i.productId)?.name || "Vin"} x${i.qty}`).join(", "),today);
  saveData();
  render();
}
function toggleOrderStatus(clientId, orderId){
  const o = clientById(clientId).orders.find(x => x.id===orderId);
  o.status = o.status==="sent" ? "pending" : "sent";
  saveData();
  render();
}
function openOrderDetail(clientId, orderId){
  state.modal = {type:"orderDetail", clientId, orderId};
  render();
}
function openOrderEditor(clientId, orderId){
  state.modal = {type:"orderEdit", clientId, orderId};
  render();
}
function saveOrderEdit(clientId, orderId){
  const c = clientById(clientId);
  const o = c.orders.find(x => x.id===orderId);
  o.comment = document.getElementById("edit-order-comment").value.trim();
  o.items = [];
  activeProducts().forEach(p => {
    const qty = Number(document.getElementById(`edit-order-qty-${p.id}`).value || 0);
    if(qty > 0) o.items.push({productId:p.id, qty});
  });
  if(!o.items.length) return alert("La commande doit contenir au moins un produit.");
  saveData();
  closeModal();
}

function addClientToTour(id){
  if(!data.tourList.find(t => t.id===Number(id))){
    data.tourList.push({id:Number(id), time:""});
    saveData();
  }
  render();
}
function removeFromTour(id){
  data.tourList = data.tourList.filter(t => t.id!==Number(id));
  saveData();
  render();
}
function moveTourUp(index){
  if(index<=0) return;
  [data.tourList[index-1], data.tourList[index]] = [data.tourList[index], data.tourList[index-1]];
  saveData();
  render();
}
function moveTourDown(index){
  if(index>=data.tourList.length-1) return;
  [data.tourList[index+1], data.tourList[index]] = [data.tourList[index], data.tourList[index+1]];
  saveData();
  render();
}
function updateTourTime(index, value){
  data.tourList[index].time = value;
  saveData();
}

function productStats(productId){
  const tastings = [];
  const orders = [];
  data.clients.forEach(c => {
    (c.tastings||[]).forEach(t => {
      if(t.productId===productId && inPeriod(t.date)) tastings.push({...t, clientId:c.id, clientName:c.name});
    });
    (c.orders||[]).forEach(o => {
      if(!inPeriod(o.date)) return;
      o.items.forEach(i => {
        if(i.productId===productId) orders.push({clientId:c.id, clientName:c.name, date:o.date, status:o.status, qty:i.qty});
      });
    });
  });
  const ratings = tastings.filter(t => t.rating>0).map(t => t.rating);
  return {
    tastings,
    orders,
    avg: ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : "—"
  };
}
function openProductClients(productId, mode){
  state.modal = {type:"productRows", productId, mode};
  render();
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  downloadBlob(blob, `crm-vin-${today}.json`);
}
function exportClientsCSV(){
  const rows = [["id","nom","type","tarif","statut","ville"]];
  data.clients.forEach(c => rows.push([c.id,c.name,c.type,c.tariff,c.status,c.city]));
  downloadBlob(new Blob([toCSV(rows)], {type:"text/csv;charset=utf-8;"}), `clients-${today}.csv`);
}
function exportProductsCSV(){
  const rows = [["id","nom","millesime"]];
  data.products.forEach(p => rows.push([p.id,p.name,p.vintage]));
  downloadBlob(new Blob([toCSV(rows)], {type:"text/csv;charset=utf-8;"}), `produits-${today}.csv`);
}
function toCSV(rows){ return rows.map(r => r.map(v => `"${String(v ?? "").replace(/"/g,'""')}"`).join(";")).join("\n"); }
function downloadBlob(blob, filename){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function header(title, subtitle="", back=null){
  return `
    <div class="header">
      <div class="row">
        <div>
          <div class="title">${esc(title)}</div>
          ${subtitle ? `<div class="subtitle">${subtitle}</div>` : ``}
        </div>
        ${back ? `<button class="btn soft" onclick="${back}">Retour</button>` : ``}
      </div>
    </div>
  `;
}

function viewHome(){
  const urgent = dueToday();
  const pending = allOrders().filter(o => o.status==="pending").length;
  return `
    ${header("Bonjour 👋","Usage terrain")}
    <div class="content">
      <div class="card dark">
        <div class="name">Tournée du jour</div>
        <div class="muted">${data.tourList.length} étape(s)</div>
        <div class="grid2" style="margin-top:8px">
          <button class="btn secondary" onclick="go('tour')">Voir tournée</button>
          <button class="btn secondary" onclick="openTourMaps()">GPS tournée</button>
        </div>
      </div>

      <div class="grid3">
        <div class="card" onclick="go('clients')"><div class="stat">${data.clients.length}</div><div class="muted">Clients</div></div>
        <div class="card" onclick="go('relances')"><div class="stat">${urgent.length}</div><div class="muted">Relances</div></div>
        <div class="card" onclick="go('orders')"><div class="stat">${pending}</div><div class="muted">Cmd</div></div>
      </div>

      <div class="card">
        <div class="grid2">
          <button class="btn" onclick="go('clientCreate')">+ Nouveau client</button>
          <button class="btn secondary" onclick="go('stats')">Stats</button>
        </div>
      </div>
    </div>
  `;
}

function viewClients(){
  const rows = filteredClients();
  const suggestions = clientSuggestions(state.clientSearch);
  return `
    ${header("Clients & prospects", `${rows.length} fiche(s)`)}
    <div class="content">
      <button class="btn" onclick="go('clientCreate')">+ Nouveau client</button>
      <input id="client-search" class="field" placeholder="Rechercher un client, une ville..." value="${esc(state.clientSearch)}" oninput="setClientSearch(this.value)">
      ${suggestions.length ? `<div class="suggestions">${suggestions.map(c => `<div class="suggestion" onclick="go('client',{id:${c.id}})">${esc(c.name)} · ${esc(c.city)}</div>`).join("")}</div>` : ``}
      <div class="list">
        ${rows.map(c => `
          <div class="item" onclick="go('client',{id:${c.id}})">
            <div class="row">
              <div>
                <div class="name">${esc(c.name)}</div>
                <div class="muted">${esc(c.city)} · ${esc(c.type)} · ${esc(c.tariff)}</div>
              </div>
              <span class="badge ${esc(c.status)}">${esc(c.status)}</span>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function viewClientCreate(){
  return `
    ${header("Nouveau client","Création manuelle","go('clients')")}
    <div class="content">
      <div class="card">

function viewStats(){
  const totalClients = data.clients.length;
  const activeClients = data.clients.filter(c => c.status==="client").length;
  const prospects = data.clients.filter(c => c.status==="prospect").length;
  const pending = allOrders().filter(o => o.status==="pending").length;
  const sent = allOrders().filter(o => o.status==="sent").length;
  const tastingsCount = data.clients.reduce((sum,c) => sum + (c.tastings||[]).filter(t => inPeriod(t.date)).length, 0);

  const tasteCount = {};
  const orderCount = {};
  data.clients.forEach(c => {
    (c.tastings||[]).forEach(t => { if(inPeriod(t.date)) tasteCount[t.productId] = (tasteCount[t.productId] || 0) + 1; });
    (c.orders||[]).forEach(o => {
      if(!inPeriod(o.date)) return;
      o.items.forEach(i => { orderCount[i.productId] = (orderCount[i.productId] || 0) + i.qty; });
    });
  });

  const topTasted = Object.entries(tasteCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topOrdered = Object.entries(orderCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return `
    ${header("Stats", `période ${esc(state.period)}`)}
    <div class="content">
      <div class="periods">
        <button class="btn ${state.period==='1m'?'':'secondary'}" onclick="setPeriod('1m')">1m</button>
        <button class="btn ${state.period==='3m'?'':'secondary'}" onclick="setPeriod('3m')">3m</button>
        <button class="btn ${state.period==='6m'?'':'secondary'}" onclick="setPeriod('6m')">6m</button>
        <button class="btn ${state.period==='1y'?'':'secondary'}" onclick="setPeriod('1y')">1a</button>
        <button class="btn ${state.period==='manual'?'':'secondary'}" onclick="setPeriod('manual')">manuel</button>
      </div>

      ${state.period === "manual" ? `
        <div class="card">
          <div class="section-title">Période manuelle</div>
          <input class="field" type="date" value="${esc(state.manualStart)}" onchange="setManualStart(this.value)">
          <input class="field" type="date" value="${esc(state.manualEnd)}" style="margin-top:8px" onchange="setManualEnd(this.value)">
        </div>
      ` : ``}

      <div class="stats-grid">
        <div class="stats-card"><div class="stat">${totalClients}</div><div class="muted">Clients total</div></div>
        <div class="stats-card"><div class="stat">${activeClients}</div><div class="muted">Clients actifs</div></div>
        <div class="stats-card"><div class="stat">${prospects}</div><div class="muted">Prospects</div></div>
        <div class="stats-card"><div class="stat">${dueToday().length}</div><div class="muted">Relances urgentes</div></div>
        <div class="stats-card"><div class="stat">${pending}</div><div class="muted">Cmd en attente</div></div>
        <div class="stats-card"><div class="stat">${sent}</div><div class="muted">Cmd transmises</div></div>
        <div class="stats-card"><div class="stat">${tastingsCount}</div><div class="muted">Dégustations</div></div>
      </div>

      <div class="card">
        <div class="section-title">Vins les plus dégustés</div>
        <div class="list">
          ${topTasted.length ? topTasted.map(([id,count]) => `<div class="item" onclick="openProductClients(${id},'tastings')">${esc(productById(id)?.name || 'Vin')} · ${count}</div>`).join("") : `<div class="muted">Aucune donnée.</div>`}
        </div>
      </div>

      <div class="card">
        <div class="section-title">Vins les plus commandés</div>
        <div class="list">
          ${topOrdered.length ? topOrdered.map(([id,count]) => `<div class="item" onclick="openProductClients(${id},'orders')">${esc(productById(id)?.name || 'Vin')} · ${count} bt</div>`).join("") : `<div class="muted">Aucune donnée.</div>`}
        </div>
      </div>
    </div>
  `;
}

    const o = c.orders.find(x => x.id===state.modal.orderId);
    const byProduct = {};
    (o.items||[]).forEach(i => byProduct[i.productId] = i.qty);
    return `
      <div class="modal-backdrop" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="row">
            <div><div class="name">Modifier la commande</div><div class="muted">${esc(c.name)} · ${fmtDate(o.date)}</div></div>
            <button class="btn soft" onclick="closeModal()">Fermer</button>
          </div>
          ${activeProducts().map(p => `
            <div class="order-line" style="margin-top:10px">
              <div>
                <div class="name">${esc(p.name)} ${esc(p.vintage)}</div>
                <div class="muted">${esc(p.color)}</div>
              </div>
              <input id="edit-order-qty-${p.id}" class="field" type="number" min="0" value="${byProduct[p.id] || 0}">
            </div>
          `).join("")}
          <textarea id="edit-order-comment" class="field" style="margin-top:10px" placeholder="Commentaire">${esc(o.comment || "")}</textarea>
          <button class="btn" style="margin-top:10px" onclick="saveOrderEdit(${c.id},${o.id})">Enregistrer la commande</button>
        </div>
      </div>
    `;
  }
  if(state.modal.type==="productRows"){
    const p = productById(state.modal.productId);
    const s = productStats(p.id);
    const rows = state.modal.mode==="tastings"
      ? s.tastings.map(t => ({clientId:t.clientId,title:t.clientName,line1:`${fmtDate(t.date)} · ${t.rating ? "★".repeat(t.rating) : "Sans note"}`,line2:t.comment || ""}))
      : s.orders.map(o => ({clientId:o.clientId,title:o.clientName,line1:`${fmtDate(o.date)} · ${o.qty} bt · ${o.status === 'sent' ? 'transmise' : 'non transmise'}`,line2:""}));
    return `
      <div class="modal-backdrop" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="row">
            <div><div class="name">${esc(p.name)} ${esc(p.vintage)}</div></div>
            <button class="btn soft" onclick="closeModal()">Fermer</button>
          </div>
          <div class="list" style="margin-top:10px">
            ${rows.length ? rows.map(r => `
              <div class="item" onclick="closeModal(); go('client',{id:${r.clientId}})">
                <div class="name">${esc(r.title)}</div>
                <div class="muted">${esc(r.line1)}</div>
                ${r.line2 ? `<div class="small" style="margin-top:6px">${esc(r.line2)}</div>` : ``}
              </div>
            `).join("") : `<div class="muted">Aucun résultat.</div>`}
          </div>
        </div>
      </div>
    `;
  }
  return "";
}

function renderNav(){
  const current =
    state.screen==="client" ? "clients" :
    state.screen==="clientCreate" ? "clients" :
    state.screen==="product" ? "products" :
    state.screen;

  const tabs = [
    ["home","Accueil"],
    ["clients","Clients"],
    ["relances","Relances"],
    ["orders","Cmd"],
    ["products","Vins"],
    ["tour","Tournée"],
    ["stats","Stats"]
  ];

  return `
    <div class="nav">
      <div class="nav-inner">
        ${tabs.map(([key,label]) => `<button class="tab ${current===key?'active':''}" onclick="go('${key}')">${label}</button>`).join("")}
      </div>
    </div>
  `;
}

function render(){
  let html = "";
  if(state.screen==="home") html = viewHome();
  if(state.screen==="clients") html = viewClients();
  if(state.screen==="clientCreate") html = viewClientCreate();
  if(state.screen==="client") html = viewClient(state.params.id);
  if(state.screen==="relances") html = viewRelances();
  if(state.screen==="orders") html = viewOrders();
  if(state.screen==="products") html = viewProducts();
  if(state.screen==="product") html = viewProduct(state.params.id);
  if(state.screen==="tour") html = viewTour();
  if(state.screen==="stats") html = viewStats();

  const root = document.getElementById("app");
  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  const activeValue = active && "value" in active ? active.value : null;
  const selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === "number" ? active.selectionEnd : null;

  root.innerHTML = html + renderNav() + renderModal();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(activeValue !== null) el.value = activeValue;
      if(selStart !== null && selEnd !== null && typeof el.setSelectionRange === "function"){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

function setClientSearch(v){ state.clientSearch = v; render(); }
function setRelanceSearch(v){ state.relanceSearch = v; render(); }
function setTourSearch(v){ state.tourSearch = v; render(); }
function setOrdersDate(v){ state.ordersDate = v; render(); }
function setPeriod(v){ state.period = v; render(); }
function setManualStart(v){ state.manualStart = v; render(); }
function setManualEnd(v){ state.manualEnd = v; render(); }
function closeModal(){ state.modal = null; render(); }

window.go = go;
window.setClientSearch = setClientSearch;
window.setRelanceSearch = setRelanceSearch;
window.setTourSearch = setTourSearch;
window.setOrdersDate = setOrdersDate;

window.setManualStart = setManualStart;
window.setManualEnd = setManualEnd;
window.createClient = createClient;
window.saveClientEdits = saveClientEdits;
window.markVisited = markVisited;
window.openVisitedPicker = openVisitedPicker;
window.setVisitedManual = setVisitedManual;
window.postponeFollowUp = postponeFollowUp;
window.setManualFollowUp = setManualFollowUp;
window.addFollowUpForClient = addFollowUpForClient;
window.setTasteRating = setTasteRating;
window.setTasteComment = setTasteComment;
window.addTastings = addTastings;
window.addOrder = addOrder;
window.toggleOrderStatus = toggleOrderStatus;
window.openOrderDetail = openOrderDetail;
window.openOrderEditor = openOrderEditor;
window.saveOrderEdit = saveOrderEdit;
window.addClientToTour = addClientToTour;
window.removeFromTour = removeFromTour;
window.moveTourUp = moveTourUp;

render();
</script>
