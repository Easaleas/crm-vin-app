<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Vin</title>
  <style>
    :root{
      --bg:#f5f5f5; --card:#fff; --text:#111; --muted:#666; --border:#ddd;
      --dark:#111; --soft:#f1f1f1; --blue:#eaf3ff; --green:#eaf9ef; --orange:#fff4e8; --red:#fff0f0;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Arial,sans-serif;color:var(--text);padding-bottom:84px}
    .app{max-width:430px;margin:0 auto}
    .header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--border);padding:14px 16px;z-index:10}
    .title{font-size:22px;font-weight:700}
    .subtitle{font-size:12px;color:var(--muted);margin-top:4px}
    .content{padding:12px;display:flex;flex-direction:column;gap:12px}
