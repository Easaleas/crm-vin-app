<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Vin</title>
  <meta name="theme-color" content="#111111" />
  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#111111;
      --muted:#6b7280;
      --border:#e5e7eb;
      --soft:#f3f4f6;
      --accent:#111111;
      --ok:#16a34a;
      --warn:#d97706;
      --danger:#dc2626;
      --info:#2563eb;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{padding-bottom:84px}
    .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg)}
    .header{
      position:sticky;top:0;z-index:20;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:14px 16px
    }
    .title{margin:0;font-size:22px;font-weight:800;letter-spacing:-.02em}
    .subtitle{margin-top:4px;color:var(--muted);font-size:12px}
    .content{padding:16px;display:flex;flex-direction:column;gap:16px}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      box-shadow:0 1px 0 rgba(0,0,0,.02);
    }
    .dark{
      background:#111;color:#fff;border-color:#111
    }
    .dark .subtitle,.dark .muted{color:#d1d5db}
    .section-title{
      font-size:16px;font-weight:800;margin:0 0 10px 0;letter-spacing:-.01em
    }
    .muted{color:var(--muted);font-size:12px}
    .small{font-size:13px}
    .name{font-size:15px;font-weight:700}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .col{display:flex;flex-direction:column;gap:10px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat{font-size:28px;font-weight:800;letter-spacing:-.03em}
    .field, select, textarea{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      font:inherit;
      color:var(--text);
    }
    textarea{min-height:96px;resize:vertical}
    .btn{
      appearance:none;border:none;background:var(--accent);color:#fff;
      border-radius:16px;padding:12px 14px;font-weight:700;
      cursor:pointer;text-decoration:none;text-align:center;display:inline-flex;
      align-items:center;justify-content:center;gap:8px;min-height:44px;
    }
    .btn.full{width:100%}
    .btn.secondary{background:#fff;color:#111;border:1px solid var(--border)}
    .btn.soft{background:var(--soft);color:#111}
    .btn.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
    .btn.danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .btn.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .list{display:flex;flex-direction:column;gap:10px}
    .item{
      background:#fff;border:1px solid var(--border);border-radius:18px;
      padding:14px;cursor:pointer
    }
    .badge{
      display:inline-flex;align-items:center;justify-content:center;
      padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700
    }
    .client{background:#dcfce7;color:#166534}
    .prospect{background:#fef3c7;color:#92400e}
    .inactive{background:#e5e7eb;color:#374151}
    .activeWine{background:#ecfccb;color:#3f6212}
    .archivedWine{background:#f3f4f6;color:#4b5563}
    .timeline{display:flex;flex-direction:column;gap:12px}
    .timeline-item{display:flex;gap:10px}
    .dot{width:10px;height:10px;border-radius:50%;background:#111;margin-top:5px;flex:0 0 auto}
    .hr{height:1px;background:var(--border);margin:8px 0}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px}
    .pill{
      display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;
      background:#f3f4f6;font-size:12px;color:#374151
    }
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .mapbox{
      position:relative;height:320px;border-radius:22px;overflow:hidden;
      background:linear-gradient(135deg,#d1d5db,#e5e7eb);border:1px solid var(--border)
    }
    .mapgrid{
      position:absolute;inset:0;opacity:.35;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.75) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.75) 1px, transparent 1px);
      background-size:38px 38px;
    }
    .pin{
      position:absolute;width:18px;height:18px;border-radius:50%;
      border:4px solid #fff;box-shadow:0 4px 10px rgba(0,0,0,.15)
    }
    .pin.client{background:#22c55e}
    .pin.prospect{background:#f59e0b}
    .pin.inactive{background:#6b7280}
    .nav{
      position:fixed;left:0;right:0;bottom:0;background:#fff;
      border-top:1px solid var(--border);padding:10px 8px;z-index:25
    }
    .nav-inner{
      max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:6px
    }
    .tab{
      appearance:none;border:none;background:transparent;border-radius:16px;
      padding:10px 6px;font-size:11px;color:var(--muted);cursor:pointer
    }
    .tab.active{background:#111;color:#fff;font-weight:700}
    .order-line{display:grid;grid-template-columns:1fr 90px;gap:10px;align-items:center;margin-top:10px}
    .star-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .star-btn{
      font-size:24px;line-height:1;background:transparent;border:none;cursor:pointer;padding:2px
    }
    .star-off{opacity:.25}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stats-card{padding:12px;border:1px solid var(--border);border-radius:18px;background:#fafafa;cursor:pointer}
    .sticky-actions{position:sticky;bottom:74px;z-index:10}
  </style>
</head>

let data = loadData();
let search = "";
let productFilter = "all";
let routeStackGuard = false;
let currentScreen = { name: "home", params: {} };
let modal = null;
let tastingDraftRating = 0;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : structuredClone(defaultData);
  } catch {
    return structuredClone(defaultData);
  }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function structuredClone(obj){
  return JSON.parse(JSON.stringify(obj));
}
function nextId(arr){
  return Math.max(0, ...arr.map(x => Number(x.id) || 0)) + 1;
}
function esc(v){
  return String(v ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function fmtDate(v){
  if(!v) return "—";
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString("fr-FR");
}
function addDays(dateStr, days){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function clientById(id){ return data.clients.find(c => c.id === Number(id)); }
function productById(id){ return data.products.find(p => p.id === Number(id)); }

function pushScreen(name, params = {}){
  currentScreen = { name, params };
  history.pushState({ screen: currentScreen }, "", "#" + name + (params.id ? "-" + params.id : ""));
  render();
}
function replaceScreen(name, params = {}){
  currentScreen = { name, params };
  history.replaceState({ screen: currentScreen }, "", "#" + name + (params.id ? "-" + params.id : ""));
  render();
}
window.addEventListener("popstate", (e) => {
  if(routeStackGuard) return;
  if (e.state && e.state.screen) {
    currentScreen = e.state.screen;
    render();
  } else {
    currentScreen = { name: "home", params: {} };
    render();
  }
});
history.replaceState({ screen: currentScreen }, "", "#home");

function openModal(type, payload = {}){
  modal = { type, payload };
  render();
}
function closeModal(){
  modal = null;
  render();
}

function statusBadge(status){
  const cls = status === "client" ? "client" : status === "prospect" ? "prospect" : "inactive";
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}
function wineBadge(active){
  return `<span class="badge ${active ? "activeWine" : "archivedWine"}">${active ? "actif" : "archivé"}</span>`;
}

function filteredClients(){
  return data.clients.filter(c => {
    const hay = `${c.name} ${c.city} ${c.type} ${c.tariff} ${c.status} ${c.notes}`.toLowerCase();
    return hay.includes(search.toLowerCase());
  });
}
function filteredProducts(){
  return data.products.filter(p => {
    const hay = `${p.name} ${p.family} ${p.vintage} ${p.color} ${p.notes} ${p.techSheet}`.toLowerCase();
    const okSearch = hay.includes(search.toLowerCase());
    const okFilter = productFilter === "all" || (productFilter === "active" && p.active) || (productFilter === "archived" && !p.active);
    return okSearch && okFilter;
  });
}
function dueToday(){
  return data.clients.filter(c => c.nextFollowUp && c.nextFollowUp <= today).sort((a,b) => a.nextFollowUp.localeCompare(b.nextFollowUp));
}
function dueSoon(){
  const limit = addDays(today, 7);
  return data.clients.filter(c => c.nextFollowUp && c.nextFollowUp > today && c.nextFollowUp <= limit).sort((a,b) => a.nextFollowUp.localeCompare(b.nextFollowUp));
}

function mapsUrl(address){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
}
function wazeUrl(address){
  return `https://waze.com/ul?q=${encodeURIComponent(address)}&navigate=yes`;
}
function openTourMaps(){
  const clients = data.tourList.map(t => clientById(t.id)).filter(Boolean);
  if (!clients.length) {
    alert("Aucun client dans la tournée.");
    return;
  }
  const addresses = clients.map(c => c.address).filter(Boolean);
  if (!addresses.length) {
    alert("Aucune adresse exploitable dans la tournée.");
    return;
  }
  const origin = addresses[0];
  const destination = addresses[addresses.length - 1];
  const waypoints = addresses.slice(1, -1).join("|");
  let url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&travelmode=driving`;
  if (waypoints) url += `&waypoints=${encodeURIComponent(waypoints)}`;
  window.open(url, "_blank");
}

  const c = clientById(id);

  c.zone = document.getElementById("edit-client-zone").value.trim();
  c.type = document.getElementById("edit-client-type").value;
  c.tariff = document.getElementById("edit-client-tariff").value;
  c.status = document.getElementById("edit-client-status").value;
  c.notes = document.getElementById("edit-client-notes").value.trim();
  saveData();
  alert("Fiche client mise à jour.");
  render();
}

function setManualFollowUp(id){
  const c = clientById(id);
  const date = document.getElementById("manual-followup-date").value;
  if (!date) return alert("Choisis une date.");
  c.nextFollowUp = date;
  c.history.unshift({ date: today, type: "relance", text: `Relance fixée manuellement au ${date}` });
  saveData();
  render();
}
function markVisited(id, days = 21){
  const c = clientById(id);
  c.lastVisit = today;
  c.nextFollowUp = addDays(today, days);
  c.history.unshift({ date: today, type: "visite", text: `Client visité · relance auto à +${days} jours` });
  saveData();
  render();
}
function postponeFollowUp(id, days){
  const c = clientById(id);
  c.nextFollowUp = addDays(today, days);
  c.history.unshift({ date: today, type: "relance", text: `Relance replanifiée à +${days} jours` });
  saveData();
  render();
}
function addFollowUpFromRelances(){
  const clientId = Number(document.getElementById("relance-client-select").value);
  const date = document.getElementById("relance-manual-date").value;
  if (!clientId || !date) return alert("Choisis un client et une date.");
  const c = clientById(clientId);
  c.nextFollowUp = date;
  c.history.unshift({ date: today, type: "relance", text: `Relance ajoutée depuis l’onglet Relances pour le ${date}` });
  saveData();
  render();
}

function addClientNote(id){
  const ta = document.getElementById("new-note");
  const text = ta.value.trim();
  if (!text) return;
  const c = clientById(id);
  c.history.unshift({ date: today, type: "note", text });
  ta.value = "";
  saveData();
  render();
}

function setTastingDraftRating(value){
  tastingDraftRating = value;
  render();
}
function addTasting(id){
  const productId = Number(document.getElementById("taste-product").value);
  const liked = document.getElementById("taste-liked").checked;
  const comment = document.getElementById("taste-comment").value.trim();
  if (!productId || !tastingDraftRating) return alert("Choisis un vin et une note.");
  const c = clientById(id);
  const p = productById(productId);
  c.tastings.unshift({
    id: Date.now(),
    date: today,
    productId,
    rating: tastingDraftRating,
    liked,
    comment
  });
  c.history.unshift({
    date: today,
    type: "dégustation",
    text: `${p.name} ${p.vintage} · ${"★".repeat(tastingDraftRating)}${liked ? " · aimé" : ""}${comment ? " · " + comment : ""}`
  });
  tastingDraftRating = 0;
  saveData();
  render();
}

function addOrder(id){
  const c = clientById(id);
  const items = [];
  document.querySelectorAll(".order-line").forEach(line => {
    const productId = Number(line.dataset.id);
    const qty = Number(line.querySelector("input").value || 0);
    if (qty > 0) items.push({ productId, qty });
  });
  const comment = document.getElementById("order-comment").value.trim();
  if (!items.length) return alert("Aucune quantité renseignée.");
  c.orders.unshift({
    id: Date.now(),
    date: today,
    status: "pending",
    comment,
    items
  });
  const readable = items.map(i => `${productById(i.productId)?.name || "Vin"} x ${i.qty}`).join(", ");
  c.history.unshift({ date: today, type: "commande", text: readable });
  saveData();
  render();
}
function toggleOrderStatus(clientId, orderId){
  const c = clientById(clientId);
  const o = c.orders.find(x => x.id === orderId);
  o.status = o.status === "sent" ? "pending" : "sent";
  saveData();
  render();
}

  const p = productById(id);

  p.name = document.getElementById("edit-product-name").value.trim();

function createNextVintage(id){

  copy.vintage = String((isNaN(baseVintage) ? new Date().getFullYear() : baseVintage) + 1);

function createProduct(){

  if (!family) return;
  const vintage = prompt("Millésime ?", String(new Date().getFullYear())) || "";
  const color = prompt("Couleur / type ?", "Rouge") || "";
  data.products.unshift({
    id: nextId(data.products),

  });

}
function productStats(productId, includeFamily = false){
  const p = productById(productId);
  const ids = includeFamily ? data.products.filter(x => x.family === p.family).map(x => x.id) : [productId];

  const tastingRows = [];
  const orderedRows = [];
  data.clients.forEach(c => {
    (c.tastings || []).forEach(t => {
      if (ids.includes(t.productId)) tastingRows.push({ ...t, clientId: c.id, clientName: c.name });
    });
    (c.orders || []).forEach(o => {
      o.items.forEach(it => {
        if (ids.includes(it.productId)) orderedRows.push({
          clientId: c.id, clientName: c.name, orderId: o.id, date: o.date, status: o.status, qty: it.qty, productId: it.productId
        });
      });
    });
  });

  const ratings = tastingRows.map(t => t.rating);
  return {
    tastings: tastingRows,
    orders: orderedRows,
    avg: ratings.length ? (ratings.reduce((a,b)=>a+b,0) / ratings.length).toFixed(1) : "—",
    tastingClients: new Set(tastingRows.map(x => x.clientId)).size,
    orderClients: new Set(orderedRows.map(x => x.clientId)).size
  };
}

function moveTourUp(index){

  [data.tourList[index - 1], data.tourList[index]] = [data.tourList[index], data.tourList[index - 1]];

function toCSV(rows){
  return rows.map(row => row.map(v => `"${String(v ?? "").replace(/"/g,'""')}"`).join(";")).join("\n");
}
function downloadBlob(blob, filename){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

          <div class="stats-card" onclick="openProductClients(${p.id},'tastings',true)">
            <div class="stat">${familyStats.avg}</div>
            <div class="muted">Note moy.</div>
          </div>
          <div class="stats-card" onclick="openProductClients(${p.id},'orders',true)">
            <div class="stat">${familyStats.orders.length}</div>
            <div class="muted">Commandes</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Éditer la fiche produit</div>
        <input id="edit-product-family" class="field" value="${esc(p.family)}" placeholder="Famille produit" />
        <input id="edit-product-name" class="field" value="${esc(p.name)}" placeholder="Nom de la cuvée" style="margin-top:10px" />
        <input id="edit-product-vintage" class="field" value="${esc(p.vintage)}" placeholder="Millésime" style="margin-top:10px" />
        <input id="edit-product-color" class="field" value="${esc(p.color)}" placeholder="Couleur" style="margin-top:10px" />
        <textarea id="edit-product-tech" class="field" style="margin-top:10px" placeholder="Fiche technique">${esc(p.techSheet)}</textarea>
        <textarea id="edit-product-notes" class="field" style="margin-top:10px" placeholder="Notes internes">${esc(p.notes)}</textarea>
        <label class="small" style="display:flex;align-items:center;gap:8px;margin-top:10px">
          <input id="edit-product-active" type="checkbox" ${p.active ? "checked" : ""} />
          Produit actif
        </label>
        <button class="btn full" style="margin-top:10px" onclick="saveProductEdits(${p.id})">Enregistrer le produit</button>
      </div>

      <div class="card">
        <div class="section-title">Millésimes liés</div>
        <div class="list">
          ${[p, ...related].map(x => `
            <div class="item" onclick="pushScreen('product',{id:${x.id}})">
              <div class="row">
                <div>
                  <div class="name">${esc(x.name)} ${esc(x.vintage)}</div>
                  <div class="muted">${esc(x.color)}</div>
                </div>
                ${wineBadge(x.active)}
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function renderRelances(){
  const urgent = dueToday();
  const soon = dueSoon();
  return `
    ${screenHeader("Relances", `${data.clients.filter(c => c.nextFollowUp).length} client(s) suivis`)}
    <div class="content">
      <div class="card">
        <div class="section-title">Ajouter une relance</div>
        <select id="relance-client-select" class="field">
          <option value="">Choisir un client</option>
          ${data.clients.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("")}
        </select>
        <input id="relance-manual-date" class="field" type="date" style="margin-top:10px" />
        <button class="btn full" style="margin-top:10px" onclick="addFollowUpFromRelances()">Ajouter la relance</button>
      </div>

      <div class="card" style="background:#fef2f2;border-color:#fecaca">
        <div class="name">Aujourd’hui</div>
        <div class="small" style="margin-top:6px">${urgent.length} relance(s) à traiter</div>
      </div>

      <div class="list">
        ${urgent.length ? urgent.map(c => `
          <div class="card">
            <div class="row">
              <div>
                <div class="name">${esc(c.name)}</div>
                <div class="muted">${esc(c.city)} · ${fmtDate(c.nextFollowUp)}</div>
              </div>
              <span class="badge prospect">Urgent</span>
            </div>
            <div class="grid2" style="margin-top:12px">
              <a class="btn secondary" href="${c.phone ? `tel:${c.phone}` : '#'}">Appeler</a>
              <a class="btn secondary" target="_blank" href="${mapsUrl(c.address)}">Itinéraire</a>
              <button class="btn" onclick="markVisited(${c.id},21)">Fait</button>
              <button class="btn secondary" onclick="postponeFollowUp(${c.id},7)">Reporter</button>
            </div>
          </div>
        `).join("") : `<div class="muted">Aucune relance urgente.</div>`}
      </div>

      <div class="card">
        <div class="section-title">Bientôt</div>
        <div class="list">
          ${soon.length ? soon.map(c => `
            <div class="item" onclick="pushScreen('client',{id:${c.id}})">
              <div class="name">${esc(c.name)}</div>
              <div class="muted">${esc(c.city)} · ${fmtDate(c.nextFollowUp)}</div>
            </div>
          `).join("") : `<div class="muted">Aucune relance proche.</div>`}
        </div>
      </div>
    </div>
  `;
}

function renderMap(){
  const list = filteredClients();
  return `
    ${screenHeader("Carte clients","Vue simulée")}
    <div class="content">
      <input class="field" placeholder="Zone, ville, client..." value="${esc(search)}" oninput="setSearch(this.value)" />
      <div class="mapbox">
        <div class="mapgrid"></div>
        ${list.map((c, i) => `
          <button class="pin ${c.status}" style="top:${18 + ((i*13)%65)}%;left:${15 + ((i*17)%65)}%;" onclick="pushScreen('client',{id:${c.id}})"></button>
        `).join("")}
        <div style="position:absolute;left:14px;right:14px;bottom:14px;background:rgba(255,255,255,.95);border-radius:18px;padding:14px;border:1px solid #fff">
          <div class="name">Google Maps</div>
          <div class="muted" style="margin-top:6px">Dans la vraie version, cette zone affichera la carte réelle avec itinéraires.</div>
        </div>
      </div>
    </div>
  `;
}

function renderTour(){
  return `
    ${screenHeader("Tournée du jour", `${data.tourList.length} étape(s) · ordre libre`)}
    <div class="content">
      <div class="card dark">
        <div class="subtitle">Parcours du jour</div>
        <div style="font-size:24px;font-weight:800;margin-top:6px">Organisation libre</div>
        <div class="toolbar" style="margin-top:12px">
          <button class="btn secondary" onclick="pushScreen('tourAdd')">+ Ajouter un client</button>
          <button class="btn secondary" onclick="openTourMaps()">GPS tournée</button>
        </div>
      </div>

      ${data.tourList.map((t, i) => {
        const c = clientById(t.id);
        if (!c) return "";
        return `
          <div class="card">
            <div class="row">
              <div>
                <div class="name">${i + 1}. ${esc(c.name)}</div>
                <div class="muted">${esc(c.city)} · ${esc(c.type)}</div>
              </div>
              <input class="field mono" style="width:90px;padding:10px 12px" value="${esc(t.time || "")}" placeholder="heure" onchange="updateTourTime(${i}, this.value)" />
            </div>
            <div class="grid2" style="margin-top:12px">
              <button class="btn secondary" onclick="moveTourUp(${i})">⬆️ Monter</button>
              <button class="btn secondary" onclick="moveTourDown(${i})">⬇️ Descendre</button>
              <button class="btn" onclick="markVisited(${c.id},21)">Visité</button>
              <button class="btn danger" onclick="removeFromTour(${c.id})">Supprimer</button>
            </div>
            <div class="grid2" style="margin-top:10px">
              <a class="btn secondary" href="${c.phone ? `tel:${c.phone}` : '#'}">Appeler</a>
              <a class="btn secondary" target="_blank" href="${mapsUrl(c.address)}">Itinéraire</a>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function renderTourAdd(){
  const list = availableTourClients();
  return `
    ${screenHeader("Ajouter à la tournée", `${list.length} disponible(s)`, "history.back()")}
    <div class="content">
      ${list.length ? list.map(c => `
        <div class="item" onclick="addClientToTour(${c.id})">
          <div class="name">${esc(c.name)}</div>
          <div class="muted">${esc(c.city)} · ${esc(c.type)}</div>
        </div>
      `).join("") : `<div class="muted">Tous les clients sont déjà dans la tournée.</div>`}
    </div>
  `;
}

function renderSettings(){
  return `
    ${screenHeader("Sauvegarde / export","Lire tes données même sans l’app")}
    <div class="content">
      <div class="card">
        <div class="section-title">Sauvegarde locale</div>
        <div class="small">Les modifications sont conservées sur cet appareil via le navigateur.</div>
        <div class="toolbar" style="margin-top:12px">
          <button class="btn info" onclick="saveData(); alert('Données enregistrées.')">Sauvegarder maintenant</button>
          <button class="btn danger" onclick="resetData()">Réinitialiser</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Exports</div>
        <div class="list">
          <button class="btn soft" onclick="exportJSON()">Exporter sauvegarde JSON</button>
          <button class="btn soft" onclick="exportClientsCSV()">Exporter clients CSV</button>
          <button class="btn soft" onclick="exportProductsCSV()">Exporter produits CSV</button>
          <button class="btn soft" onclick="exportReadableTXT()">Exporter document lisible TXT</button>
        </div>
      </div>
    </div>
  `;
}

function renderModal(){
  if (!modal) return "";
  if (modal.type === "productClients") {
    const { productId, mode, includeFamily } = modal.payload;
    const p = productById(productId);
    const stats = productStats(productId, includeFamily);

    const rows = mode === "tastings"
      ? stats.tastings.map(t => ({
          clientId: t.clientId,
          title: t.clientName,
          line1: `${fmtDate(t.date)} · ${"★".repeat(t.rating)}${t.liked ? " · aimé" : ""}`,
          line2: t.comment || ""
        }))
      : stats.orders.map(o => ({
          clientId: o.clientId,
          title: o.clientName,
          line1: `${fmtDate(o.date)} · ${o.qty} bt · ${o.status === "sent" ? "transmise" : "non transmise"}`,
          line2: `${productById(o.productId)?.name || ""}`
        }));

    return `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:flex;align-items:flex-end;justify-content:center" onclick="closeModal()">
        <div style="width:100%;max-width:430px;background:#fff;border-radius:24px 24px 0 0;padding:16px 16px 24px;max-height:80vh;overflow:auto" onclick="event.stopPropagation()">
          <div class="row">
            <div>
              <div class="name">${mode === "tastings" ? "Clients ayant dégusté" : "Clients ayant commandé"}</div>
              <div class="muted">${esc(p.name)} ${esc(p.vintage)}${includeFamily ? " · famille complète" : ""}</div>
            </div>
            <button class="btn soft" style="width:auto" onclick="closeModal()">Fermer</button>
          </div>
          <div class="list" style="margin-top:14px">
            ${rows.length ? rows.map(r => `
              <div class="item" onclick="closeModal(); pushScreen('client',{id:${r.clientId}})">
                <div class="name">${esc(r.title)}</div>
                <div class="muted">${esc(r.line1)}</div>
                ${r.line2 ? `<div class="small" style="margin-top:8px">${esc(r.line2)}</div>` : ``}
              </div>
            `).join("") : `<div class="muted">Aucun client.</div>`}
          </div>
        </div>
      </div>
    `;
  }
  return "";
}

function renderNav(){
  const current = currentScreen.name === "client" ? "clients"
    : currentScreen.name === "product" ? "products"
    : currentScreen.name === "tourAdd" ? "tour"
    : currentScreen.name;
  const tabs = [
    ["home","Accueil"],
    ["clients","Clients"],
    ["relances","Relances"],
    ["products","Vins"],
    ["tour","Tournée"],
    ["settings","Sauve"]
  ];
  return `
    <div class="nav">
      <div class="nav-inner">
        ${tabs.map(([key,label]) => `<button class="tab ${current===key?'active':''}" onclick="pushScreen('${key}')">${label}</button>`).join("")}
      </div>
    </div>
  `;
}

function render(){
  let html = "";
  if (currentScreen.name === "home") html = renderHome();
  if (currentScreen.name === "clients") html = renderClients();
  if (currentScreen.name === "client") html = renderClient(currentScreen.params.id);
  if (currentScreen.name === "products") html = renderProducts();
  if (currentScreen.name === "product") html = renderProduct(currentScreen.params.id);
  if (currentScreen.name === "relances") html = renderRelances();
  if (currentScreen.name === "map") html = renderMap();
  if (currentScreen.name === "tour") html = renderTour();
  if (currentScreen.name === "tourAdd") html = renderTourAdd();
  if (currentScreen.name === "settings") html = renderSettings();

  document.getElementById("app").innerHTML = html + renderNav() + renderModal();
}

window.pushScreen = pushScreen;
window.setSearch = setSearch;
window.setProductFilter = setProductFilter;
window.saveClientEdits = saveClientEdits;
window.setManualFollowUp = setManualFollowUp;
window.markVisited = markVisited;
window.postponeFollowUp = postponeFollowUp;
window.addFollowUpFromRelances = addFollowUpFromRelances;
window.addClientNote = addClientNote;
window.setTastingDraftRating = setTastingDraftRating;
window.addTasting = addTasting;
window.addOrder = addOrder;
window.toggleOrderStatus = toggleOrderStatus;
window.saveProductEdits = saveProductEdits;
window.duplicateProduct = duplicateProduct;
window.createNextVintage = createNextVintage;
window.toggleArchiveProduct = toggleArchiveProduct;
window.createProduct = createProduct;
window.openProductClients = openProductClients;
window.addClientToTour = addClientToTour;
window.removeFromTour = removeFromTour;
window.moveTourUp = moveTourUp;
window.moveTourDown = moveTourDown;
window.updateTourTime = updateTourTime;
window.openTourMaps = openTourMaps;
window.exportJSON = exportJSON;
window.exportClientsCSV = exportClientsCSV;
window.exportProductsCSV = exportProductsCSV;
window.exportReadableTXT = exportReadableTXT;
window.resetData = resetData;
window.closeModal = closeModal;

render();
</script>
</body>
</html>
